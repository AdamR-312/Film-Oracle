<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top 25 — Adam's Cinema</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Cinzel:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --black: #080608;
  --velvet: #1a0a10;
  --velvet-mid: #2a1018;
  --crimson: #6b0f1a;
  --crimson-bright: #8b1a28;
  --gold: #c9a84c;
  --gold-bright: #e8c86a;
  --gold-dim: #7a6130;
  --gold-pale: #3d3018;
  --cream: #f0e8d8;
  --cream-dim: #c8b898;
  --cream-muted: #7a6a58;
  --cream-ghost: #1e1810;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }

body {
  background: var(--black);
  color: var(--cream);
  font-family: 'EB Garamond', Georgia, serif;
  min-height: 100vh;
}
body::before {
  content:''; position:fixed; inset:0;
  background:
    repeating-linear-gradient(90deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px),
    repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,0.008) 2px,rgba(255,255,255,0.008) 4px);
  pointer-events:none; z-index:500;
}

.ceiling { position:fixed; top:0; left:0; right:0; height:4px; background:linear-gradient(90deg,transparent,var(--gold-dim),var(--gold),var(--gold-dim),transparent); z-index:10; }
.ceiling-glow { position:fixed; top:0; left:0; right:0; height:200px; background:linear-gradient(to bottom,rgba(201,168,76,0.05),transparent); pointer-events:none; z-index:1; }
.floor { position:fixed; bottom:0; left:0; right:0; height:6px; background:repeating-linear-gradient(90deg,var(--crimson) 0px,var(--crimson) 80px,var(--gold-pale) 80px,var(--gold-pale) 84px,var(--crimson) 84px); z-index:10; }
.floor-glow { position:fixed; bottom:0; left:0; right:0; height:200px; background:linear-gradient(to top,rgba(107,15,26,0.1),transparent); pointer-events:none; z-index:1; }

/* Nav */
.nav {
  position:sticky; top:0; z-index:100;
  background:rgba(8,6,8,0.96);
  border-bottom:1px solid var(--gold-pale);
  padding:14px 48px;
  display:flex; align-items:center; justify-content:space-between;
  backdrop-filter:blur(8px);
}
.nav-back { display:flex; align-items:center; gap:12px; font-family:'Cinzel',serif; font-size:10px; letter-spacing:3px; color:var(--gold-dim); text-decoration:none; text-transform:uppercase; transition:color 0.3s; }
.nav-back:hover { color:var(--gold); }
.nav-back-line { width:24px; height:1px; background:currentColor; transition:width 0.3s; }
.nav-back:hover .nav-back-line { width:36px; }
.nav-title { font-family:'Cinzel',serif; font-size:10px; letter-spacing:4px; color:var(--cream-muted); text-transform:uppercase; }

/* Header */
header { text-align:center; padding:72px 20px 52px; position:relative; }
header::after { content:''; position:absolute; bottom:0; left:50%; transform:translateX(-50%); width:300px; height:1px; background:linear-gradient(90deg,transparent,var(--gold-dim),transparent); }
.list-label { font-family:'Cinzel',serif; font-size:10px; letter-spacing:6px; color:var(--gold-dim); text-transform:uppercase; margin-bottom:18px; opacity:0; animation:fadeUp 0.7s ease forwards 0.1s; }
h1 { font-family:'Playfair Display',serif; font-weight:400; font-size:clamp(36px,6vw,72px); line-height:0.95; color:var(--cream); opacity:0; animation:fadeUp 0.7s ease forwards 0.2s; }
h1 em { font-style:italic; color:var(--gold); display:block; }
.header-ornament { display:flex; align-items:center; justify-content:center; gap:14px; margin:24px auto; max-width:360px; opacity:0; animation:fadeUp 0.7s ease forwards 0.3s; }
.orn-line { flex:1; height:1px; background:linear-gradient(90deg,transparent,var(--gold-dim)); }
.orn-line.r { background:linear-gradient(270deg,transparent,var(--gold-dim)); }
.orn-diamond { width:5px; height:5px; background:var(--gold); transform:rotate(45deg); }
.header-sub { font-style:italic; font-size:17px; color:var(--cream-muted); opacity:0; animation:fadeUp 0.7s ease forwards 0.4s; }

@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

/* Loading state */
#loadingState {
  text-align:center;
  padding:80px 20px;
  position:relative; z-index:2;
}
.loading-lights {
  display:flex; justify-content:center; gap:12px; margin-bottom:32px;
}
.loading-bulb {
  width:8px; height:8px; border-radius:50%;
  background:var(--gold);
  box-shadow:0 0 10px var(--gold), 0 0 24px rgba(201,168,76,0.3);
  animation:loadPulse 1.2s ease infinite;
}
.loading-bulb:nth-child(2){animation-delay:0.2s}
.loading-bulb:nth-child(3){animation-delay:0.4s}
.loading-bulb:nth-child(4){animation-delay:0.6s}
.loading-bulb:nth-child(5){animation-delay:0.8s}
@keyframes loadPulse {
  0%,100%{opacity:0.25; transform:scale(0.8)}
  50%{opacity:1; transform:scale(1)}
}
.loading-text { font-family:'Cinzel',serif; font-size:10px; letter-spacing:5px; color:var(--gold-dim); text-transform:uppercase; }

/* Error state */
#errorState {
  display:none;
  text-align:center;
  padding:80px 20px;
  position:relative; z-index:2;
}
.error-title { font-family:'Playfair Display',serif; font-size:32px; font-style:italic; color:var(--cream); margin-bottom:12px; }
.error-desc { font-size:16px; color:var(--cream-muted); line-height:1.6; margin-bottom:24px; }
.error-retry { font-family:'Cinzel',serif; font-size:9px; letter-spacing:3px; color:var(--gold-dim); background:transparent; border:1px solid rgba(201,168,76,0.25); padding:10px 24px; cursor:pointer; text-transform:uppercase; transition:all 0.3s; }
.error-retry:hover { border-color:var(--gold); color:var(--gold); }

/* Films list */
#filmsList {
  display:none;
  max-width:1000px;
  margin:0 auto;
  padding:56px 40px 120px;
  position:relative; z-index:2;
}

.list-meta {
  display:flex; align-items:center; gap:20px;
  margin-bottom:40px;
  padding-bottom:20px;
  border-bottom:1px solid rgba(201,168,76,0.08);
}
.list-meta-count { font-family:'Cinzel',serif; font-size:9px; letter-spacing:4px; color:var(--gold-dim); }
.list-meta-source { font-family:'Cinzel',serif; font-size:9px; letter-spacing:3px; color:var(--cream-muted); opacity:0.5; margin-left:auto; }

/* Film row */
.film-row {
  display:flex;
  align-items:stretch;
  gap:0;
  background:linear-gradient(135deg,rgba(20,8,12,0.85),rgba(12,5,8,0.92));
  border:1px solid rgba(201,168,76,0.06);
  margin-bottom:2px;
  position:relative;
  transition:border-color 0.3s;
  opacity:0;
  animation:fadeUp 0.5s ease forwards;
  text-decoration:none;
  color:inherit;
  display:flex;
}

.film-row:hover { border-color:rgba(201,168,76,0.25); }
.film-row::before {
  content:''; position:absolute; inset:0;
  background:radial-gradient(ellipse at 0% 50%,rgba(201,168,76,0.03),transparent 60%);
  opacity:0; transition:opacity 0.3s;
}
.film-row:hover::before { opacity:1; }

/* Rank */
.film-rank {
  display:flex; align-items:center; justify-content:center;
  width:72px; flex-shrink:0;
  border-right:1px solid rgba(201,168,76,0.06);
  padding:20px 0;
}
.rank-num {
  font-family:'Playfair Display',serif;
  font-style:italic;
  font-size:36px;
  color:var(--gold-pale);
  line-height:1;
  transition:color 0.3s;
}
.film-row:hover .rank-num { color:var(--gold-dim); }

/* Poster */
.film-poster {
  width:72px; flex-shrink:0;
  border-right:1px solid rgba(201,168,76,0.06);
  overflow:hidden;
  background:rgba(26,8,16,0.5);
  display:flex; align-items:center; justify-content:center;
}
.film-poster img {
  width:100%; height:100%;
  object-fit:cover;
  display:block;
  transition:opacity 0.4s;
  opacity:0;
}
.film-poster img.loaded { opacity:1; }
.film-poster-placeholder {
  display:flex; align-items:center; justify-content:center;
  width:72px; height:100%; min-height:100px;
  color:var(--gold-pale);
  font-size:22px;
}

/* Film info */
.film-info {
  flex:1; padding:18px 24px;
  display:flex; flex-direction:column; justify-content:center; gap:6px;
}
.film-title-row {
  display:flex; align-items:baseline; gap:10px; flex-wrap:wrap;
}
.film-title {
  font-family:'Playfair Display',serif;
  font-size:clamp(16px,2vw,20px);
  font-weight:400;
  color:var(--cream);
  line-height:1.1;
  transition:color 0.3s;
}
.film-row:hover .film-title { color:var(--cream); }
.film-year {
  font-family:'Cinzel',serif;
  font-size:10px; letter-spacing:2px;
  color:var(--cream-muted);
  white-space:nowrap;
}
.film-genres {
  display:flex; flex-wrap:wrap; gap:5px;
}
.film-genre {
  font-family:'Cinzel',serif; font-size:7px; letter-spacing:2px;
  padding:3px 8px; border:1px solid rgba(201,168,76,0.12);
  color:var(--gold-dim); text-transform:uppercase;
}
.film-overview {
  font-size:13px; line-height:1.55;
  color:var(--cream-muted);
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
  max-width:600px;
}

/* Score */
.film-score {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  width:72px; flex-shrink:0; padding:12px;
  border-left:1px solid rgba(201,168,76,0.06);
  gap:4px;
}
.score-val {
  font-family:'Playfair Display',serif;
  font-size:22px; font-style:italic;
  color:var(--gold-dim);
  line-height:1;
  transition:color 0.3s;
}
.film-row:hover .score-val { color:var(--gold); }
.score-star { font-size:10px; color:var(--gold-pale); }
.score-label { font-family:'Cinzel',serif; font-size:7px; letter-spacing:2px; color:var(--cream-muted); opacity:0.6; }

/* Stagger animation delays */
.film-row:nth-child(1)  { animation-delay:0.05s }
.film-row:nth-child(2)  { animation-delay:0.08s }
.film-row:nth-child(3)  { animation-delay:0.11s }
.film-row:nth-child(4)  { animation-delay:0.14s }
.film-row:nth-child(5)  { animation-delay:0.17s }
.film-row:nth-child(6)  { animation-delay:0.20s }
.film-row:nth-child(7)  { animation-delay:0.23s }
.film-row:nth-child(8)  { animation-delay:0.26s }
.film-row:nth-child(9)  { animation-delay:0.29s }
.film-row:nth-child(10) { animation-delay:0.32s }
.film-row:nth-child(11) { animation-delay:0.35s }
.film-row:nth-child(12) { animation-delay:0.38s }
.film-row:nth-child(13) { animation-delay:0.41s }
.film-row:nth-child(14) { animation-delay:0.44s }
.film-row:nth-child(15) { animation-delay:0.47s }
.film-row:nth-child(16) { animation-delay:0.50s }
.film-row:nth-child(17) { animation-delay:0.53s }
.film-row:nth-child(18) { animation-delay:0.56s }
.film-row:nth-child(19) { animation-delay:0.59s }
.film-row:nth-child(20) { animation-delay:0.62s }
.film-row:nth-child(21) { animation-delay:0.65s }
.film-row:nth-child(22) { animation-delay:0.68s }
.film-row:nth-child(23) { animation-delay:0.71s }
.film-row:nth-child(24) { animation-delay:0.74s }
.film-row:nth-child(25) { animation-delay:0.77s }

@media (max-width:680px) {
  #filmsList { padding:40px 20px 100px; }
  .nav { padding:12px 24px; }
  .film-rank { width:48px; }
  .rank-num { font-size:24px; }
  .film-poster { width:56px; }
  .film-score { width:56px; }
  .score-val { font-size:17px; }
  .film-info { padding:14px 16px; }
  .film-title { font-size:15px; }
  .film-overview { -webkit-line-clamp:1; }
}
</style>
</head>
<body>

<div class="ceiling"></div>
<div class="ceiling-glow"></div>
<div class="floor"></div>
<div class="floor-glow"></div>

<nav class="nav">
  <a class="nav-back" href="top25.html">
    <div class="nav-back-line"></div>
    Top 25 Lists
  </a>
  <span class="nav-title" id="navTitle">Loading…</span>
</nav>

<header>
  <div class="list-label" id="listLabel">Screening Room No. 2</div>
  <h1 id="pageTitle">Top 25<em id="pageTitleEm">…</em></h1>
  <div class="header-ornament">
    <div class="orn-line"></div>
    <div class="orn-diamond"></div>
    <div class="orn-line r"></div>
  </div>
  <p class="header-sub" id="headerSub"></p>
</header>

<!-- Loading -->
<div id="loadingState">
  <div class="loading-lights">
    <div class="loading-bulb"></div>
    <div class="loading-bulb"></div>
    <div class="loading-bulb"></div>
    <div class="loading-bulb"></div>
    <div class="loading-bulb"></div>
  </div>
  <div class="loading-text">The Oracle Consults the Archives</div>
</div>

<!-- Error -->
<div id="errorState">
  <div class="error-title">The Projection Faltered</div>
  <p class="error-desc" id="errorDesc">Something went wrong fetching this list from TMDB. Check your API key or try again.</p>
  <button class="error-retry" onclick="location.reload()">Try Again</button>
</div>

<!-- Films -->
<div id="filmsList">
  <div class="list-meta">
    <span class="list-meta-count" id="listCount"></span>
    <span class="list-meta-source">Source: TMDB · Sorted by rating</span>
  </div>
</div>

<script>
// ── Genre ID → Name ────────────────────────────────
const GENRE_MAP = {
  28:'Action', 12:'Adventure', 16:'Animation', 35:'Comedy',
  80:'Crime', 99:'Documentary', 18:'Drama', 10751:'Family',
  14:'Fantasy', 36:'History', 27:'Horror', 10402:'Music',
  9648:'Mystery', 10749:'Romance', 878:'Sci-Fi', 10770:'TV Movie',
  53:'Thriller', 10752:'War', 37:'Western'
};

// ── List configurations ────────────────────────────
const LISTS = {
  horror: {
    num: 'List 001', label: 'Screening Room No. 2',
    titleMain: 'Top 25', titleEm: 'Horror Films',
    navTitle: 'Greatest Horror',
    subtitle: 'Fear distilled into art. The films that don\'t let go.',
    endpoint: 'discover/movie?with_genres=27&sort_by=vote_average.desc&vote_count.gte=1500&include_adult=false',
  },
  thriller: {
    num: 'List 002', label: 'Screening Room No. 2',
    titleMain: 'Top 25', titleEm: 'Thrillers',
    navTitle: 'Greatest Thrillers',
    subtitle: 'Tension as a filmmaking language.',
    endpoint: 'discover/movie?with_genres=53&sort_by=vote_average.desc&vote_count.gte=2000&include_adult=false',
  },
  comedy: {
    num: 'List 003', label: 'Screening Room No. 2',
    titleMain: 'Top 25', titleEm: 'Comedies',
    navTitle: 'Greatest Comedies',
    subtitle: 'The hardest genre to perfect.',
    endpoint: 'discover/movie?with_genres=35&sort_by=vote_average.desc&vote_count.gte=1500&include_adult=false',
  },
  satire: {
    num: 'List 004', label: 'Screening Room No. 2',
    titleMain: 'Top 25', titleEm: 'Satires',
    navTitle: 'Greatest Satires',
    subtitle: 'Absurdity wielded as a weapon.',
    endpoint: 'discover/movie?with_keywords=276130&sort_by=vote_average.desc&vote_count.gte=200&include_adult=false',
  },
  action: {
    num: 'List 005', label: 'Screening Room No. 2',
    titleMain: 'Top 25', titleEm: 'Action Films',
    navTitle: 'Greatest Action',
    subtitle: 'Kinetic filmmaking at its absolute peak.',
    endpoint: 'discover/movie?with_genres=28&sort_by=vote_average.desc&vote_count.gte=2000&include_adult=false',
  },
  heist: {
    num: 'List 006', label: 'Screening Room No. 2',
    titleMain: 'Top 25', titleEm: 'Heist Films',
    navTitle: 'Greatest Heist',
    subtitle: 'The perfect plan. The inevitable unraveling.',
    endpoint: 'discover/movie?with_keywords=9663&sort_by=vote_average.desc&vote_count.gte=200&include_adult=false',
  },
  scifi: {
    num: 'List 007', label: 'Screening Room No. 2',
    titleMain: 'Top 25', titleEm: 'Science Fiction',
    navTitle: 'Greatest Sci-Fi',
    subtitle: 'The future as a mirror held to the present.',
    endpoint: 'discover/movie?with_genres=878&sort_by=vote_average.desc&vote_count.gte=2000&include_adult=false',
  },
  historical: {
    num: 'List 008', label: 'Screening Room No. 2',
    titleMain: 'Top 25', titleEm: 'Historical Films',
    navTitle: 'Greatest Historical',
    subtitle: 'The past rendered vivid.',
    endpoint: 'discover/movie?with_genres=36&sort_by=vote_average.desc&vote_count.gte=1000&include_adult=false',
  },
  drama: {
    num: 'List 009', label: 'Screening Room No. 2',
    titleMain: 'Top 25', titleEm: 'Dramas',
    navTitle: 'Greatest Dramas',
    subtitle: 'Cinema stripped to its essential truth.',
    endpoint: 'discover/movie?with_genres=18&without_genres=28,27,878,35&sort_by=vote_average.desc&vote_count.gte=3000&include_adult=false',
  },
  gangster: {
    num: 'List 010', label: 'Screening Room No. 2',
    titleMain: 'Top 25', titleEm: 'Gangster Films',
    navTitle: 'Greatest Gangster',
    subtitle: 'The rise, the empire, the fall.',
    endpoint: 'discover/movie?with_keywords=1562&sort_by=vote_average.desc&vote_count.gte=200&include_adult=false',
  },
  war: {
    num: 'List 011', label: 'Screening Room No. 2',
    titleMain: 'Top 25', titleEm: 'War Films',
    navTitle: 'Greatest War',
    subtitle: 'Films that refuse to glorify what they depict.',
    endpoint: 'discover/movie?with_genres=10752&sort_by=vote_average.desc&vote_count.gte=1000&include_adult=false',
  },
  romance: {
    num: 'List 012', label: 'Screening Room No. 2',
    titleMain: 'Top 25', titleEm: 'Romance Films',
    navTitle: 'Greatest Romance',
    subtitle: "Love under pressure. Cinema's oldest subject, still devastating.",
    endpoint: 'discover/movie?with_genres=10749&sort_by=vote_average.desc&vote_count.gte=1000&include_adult=false',
  },
  surrealism: {
    num: 'List 013', label: 'Screening Room No. 2',
    titleMain: 'Top 25', titleEm: 'Surrealist Films',
    navTitle: 'Greatest Surrealism',
    subtitle: 'Dreams made real. Logic made optional.',
    endpoint: 'discover/movie?with_keywords=4734&sort_by=vote_average.desc&vote_count.gte=100&include_adult=false',
  }
};

// ── Cloudflare Worker URL ─────────────────────────
const WORKER = 'https://tmdb-proxy.adamrowe312.workers.dev';

// ── Init ──────────────────────────────────────────
const params  = new URLSearchParams(location.search);
const listKey = params.get('list') || 'horror';
const config  = LISTS[listKey];

if (!config) {
  document.getElementById('pageTitle').textContent = 'List Not Found';
  document.getElementById('loadingState').style.display = 'none';
} else {
  document.title = `${config.titleEm} — Adam's Cinema`;
  document.getElementById('listLabel').textContent = config.label;
  document.getElementById('pageTitle').childNodes[0].textContent = config.titleMain + ' ';
  document.getElementById('pageTitleEm').textContent = config.titleEm;
  document.getElementById('navTitle').textContent = config.navTitle;
  document.getElementById('headerSub').textContent = config.subtitle;

  loadList();
}

// ── Fetch via Worker (no key needed client-side) ──
async function loadList() {
  const sep = config.endpoint.includes('?') ? '&' : '?';

  try {
    const [r1, r2] = await Promise.all([
      fetch(`${WORKER}/${config.endpoint}${sep}page=1`),
      fetch(`${WORKER}/${config.endpoint}${sep}page=2`)
    ]);

    if (!r1.ok) throw new Error(`Worker error ${r1.status}`);
    const [d1, d2] = await Promise.all([r1.json(), r2.json()]);
    const movies = [...(d1.results||[]), ...(d2.results||[])].slice(0, 25);

    if (!movies.length) throw new Error('No results returned');

    document.getElementById('loadingState').style.display = 'none';
    renderList(movies);
  } catch(err) {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('errorState').style.display = 'block';
    document.getElementById('errorDesc').textContent =
      `Something went wrong loading this list. Please try again. (${err.message})`;
  }
}

function renderList(movies) {
  const container = document.getElementById('filmsList');
  document.getElementById('listCount').textContent = `${movies.length} Films`;

  movies.forEach((m, i) => {
    const year    = m.release_date ? m.release_date.slice(0,4) : '—';
    const score   = m.vote_average ? m.vote_average.toFixed(1) : '—';
    const genres  = (m.genre_ids || []).slice(0,3).map(id => GENRE_MAP[id]).filter(Boolean);
    const overview= m.overview ? m.overview.slice(0,160) + (m.overview.length > 160 ? '…' : '') : '';
    const rankStr = String(i + 1).padStart(2, '0');

    const row = document.createElement('div');
    row.className = 'film-row';

    row.innerHTML = `
      <div class="film-rank"><div class="rank-num">${rankStr}</div></div>
      <div class="film-poster" id="poster-${i}">
        ${m.poster_path
          ? `<img src="https://image.tmdb.org/t/p/w92${m.poster_path}" alt="${m.title}" loading="lazy">`
          : `<div class="film-poster-placeholder">✦</div>`
        }
      </div>
      <div class="film-info">
        <div class="film-title-row">
          <div class="film-title">${m.title}</div>
          <div class="film-year">${year}</div>
        </div>
        <div class="film-genres">
          ${genres.map(g => `<span class="film-genre">${g}</span>`).join('')}
        </div>
        ${overview ? `<div class="film-overview">${overview}</div>` : ''}
      </div>
      <div class="film-score">
        <div class="score-val">${score}</div>
        <div class="score-star">★</div>
        <div class="score-label">TMDB</div>
      </div>
    `;

    // Fade in poster when loaded
    const img = row.querySelector('img');
    if (img) img.addEventListener('load', () => img.classList.add('loaded'));

    container.appendChild(row);
  });

  container.style.display = 'block';
}
</script>

</body>
</html>
