<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Concession Stand — Adam's Cinema</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Cinzel:wght@400;500;600&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.room-label { font-family:'Cinzel',serif; font-size:10px; letter-spacing:6px; color:var(--gold-dim); text-transform:uppercase; margin-bottom:20px; opacity:0; animation:fadeUp 0.8s ease forwards 0.2s; }
h1 { opacity:0; animation:fadeUp 0.8s ease forwards 0.4s; }
.header-ornament { opacity:0; animation:fadeUp 0.8s ease forwards 0.6s; }
.header-sub { opacity:0; animation:fadeUp 0.8s ease forwards 0.8s; }
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
main { max-width:900px; margin:0 auto; padding:64px 48px 140px; position:relative; z-index:2; }
/* ── Quote counter + navigation ──────────────────────────────────── */
.quote-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:52px; opacity:0; animation:fadeUp 0.7s ease forwards 1s; }
.quote-count { font-family:'Cinzel',serif; font-size:9px; letter-spacing:4px; color:var(--gold-dim); text-transform:uppercase; }
.shuffle-btn { font-family:'Cinzel',serif; font-size:9px; letter-spacing:3px; color:var(--cream-muted); text-transform:uppercase; border:1px solid rgba(201,168,76,0.15); padding:8px 18px; background:none; cursor:pointer; transition:all 0.3s; }
.shuffle-btn:hover { color:var(--gold); border-color:rgba(201,168,76,0.35); }
/* ── Quote stage ─────────────────────────────────────────────────── */
.quote-stage { text-align:center; margin-bottom:48px; opacity:0; animation:fadeUp 0.7s ease forwards 1.1s; }
.quote-text { font-family:'EB Garamond',Georgia,serif; font-size:clamp(22px,3.5vw,40px); font-style:italic; color:var(--cream); line-height:1.6; }
.blank-input { font-family:'EB Garamond',Georgia,serif; font-style:italic; font-size:inherit; color:var(--gold-bright); background:transparent; border:none; border-bottom:2px solid rgba(201,168,76,0.5); outline:none; padding:0 6px 2px; min-width:80px; width:10ch; transition:border-color 0.3s,width 0.2s; text-align:center; text-shadow:0 0 12px rgba(232,200,106,0.3); }
.blank-input:focus { border-bottom-color:var(--gold); text-shadow:0 0 16px rgba(232,200,106,0.5); }
.blank-input::placeholder { color:var(--cream-muted); font-style:normal; font-size:0.55em; letter-spacing:3px; font-family:'Cinzel',serif; text-transform:uppercase; text-shadow:none; }
.quote-source { font-family:'Cinzel',serif; font-size:9px; letter-spacing:3px; color:var(--gold-dim); text-transform:uppercase; margin-top:20px; opacity:0.7; }
/* ── Submit button ───────────────────────────────────────────────── */
.submit-wrap { text-align:center; margin-bottom:52px; opacity:0; animation:fadeUp 0.7s ease forwards 1.2s; }
.submit-btn { font-family:'Playfair Display',serif; font-style:italic; font-size:20px; color:var(--cream); background:none; border:1px solid var(--gold-dim); padding:16px 48px; cursor:pointer; transition:all 0.35s; position:relative; }
.submit-btn::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(201,168,76,0.06),rgba(107,15,26,0.12)); opacity:0; transition:opacity 0.35s; }
.submit-btn:hover:not(:disabled) { border-color:var(--gold); box-shadow:0 0 30px rgba(201,168,76,0.15); }
.submit-btn:hover:not(:disabled)::before { opacity:1; }
.submit-btn:disabled { opacity:0.4; cursor:not-allowed; }
/* ── Response card ───────────────────────────────────────────────── */
#responseStage { display:none; margin-bottom:40px; }
.response-card { background:rgba(26,8,16,0.28); backdrop-filter:blur(16px) saturate(1.1); -webkit-backdrop-filter:blur(16px) saturate(1.1); border:1px solid rgba(201,168,76,0.18); padding:36px 40px; position:relative; }
.response-card::before,.response-card::after { content:''; position:absolute; width:14px; height:14px; border-color:rgba(201,168,76,0.4); border-style:solid; }
.response-card::before { top:-1px; left:-1px; border-width:1px 0 0 1px; }
.response-card::after { bottom:-1px; right:-1px; border-width:0 1px 1px 0; }
.response-speaker { font-family:'Cinzel',serif; font-size:9px; letter-spacing:3px; color:var(--gold); text-transform:uppercase; margin-bottom:18px; text-shadow:0 0 10px rgba(201,168,76,0.4); }
.response-body { font-family:'EB Garamond',Georgia,serif; font-size:20px; font-style:italic; color:var(--cream-dim); line-height:1.75; min-height:60px; }
.cursor-blink { display:inline-block; width:2px; height:1em; background:var(--gold); vertical-align:middle; animation:blink 0.75s step-end infinite; margin-left:2px; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
/* ── Reveal panel ────────────────────────────────────────────────── */
#revealPanel { display:none; margin-top:32px; padding-top:24px; border-top:1px solid rgba(201,168,76,0.12); text-align:center; }
.reveal-label { font-family:'Cinzel',serif; font-size:8px; letter-spacing:4px; color:var(--cream-muted); text-transform:uppercase; margin-bottom:12px; }
.reveal-answer { font-family:'Playfair Display',serif; font-size:clamp(28px,4vw,48px); font-style:italic; color:var(--gold-bright); text-shadow:0 0 20px rgba(232,200,106,0.4),0 0 40px rgba(201,168,76,0.2); line-height:1.1; margin-bottom:10px; animation:answerReveal 0.6s ease forwards; }
@keyframes answerReveal { from{opacity:0;transform:scale(0.9)} to{opacity:1;transform:scale(1)} }
.reveal-film { font-family:'Cinzel',serif; font-size:9px; letter-spacing:3px; color:var(--gold-dim); text-transform:uppercase; }
/* ── Next button ─────────────────────────────────────────────────── */
#nextWrap { display:none; text-align:center; margin-top:36px; }
.next-btn { font-family:'Cinzel',serif; font-size:10px; letter-spacing:4px; color:var(--gold-dim); text-transform:uppercase; border:1px solid rgba(201,168,76,0.2); padding:12px 32px; background:none; cursor:pointer; transition:all 0.3s; display:inline-flex; align-items:center; gap:12px; }
.next-btn:hover { color:var(--gold); border-color:rgba(201,168,76,0.4); box-shadow:0 0 20px rgba(201,168,76,0.1); }
.next-arrow { width:24px; height:1px; background:currentColor; transition:width 0.3s; }
.next-btn:hover .next-arrow { width:36px; }
/* ── Loading state ───────────────────────────────────────────────── */
.loading-msg { font-family:'Cinzel',serif; font-size:9px; letter-spacing:5px; color:var(--gold-dim); text-transform:uppercase; text-align:center; padding:40px 0; animation:pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }
footer { border-top:1px solid rgba(201,168,76,0.08); }
@media(max-width:640px) {
  main { padding:48px 24px 100px; }
  .quote-text { font-size:20px; }
  .blank-input { display:block; margin:12px auto 0; }
  .response-card { padding:24px 20px; }
  .response-body { font-size:18px; }
}
</style>
</head>
<body>

<div class="ceiling"></div>
<div class="ceiling-glow"></div>
<div class="floor"></div>
<div class="floor-glow"></div>

<nav class="nav">
  <a class="nav-back" href="index.html">
    <div class="nav-back-line"></div>
    Grand Lobby
  </a>
  <span class="nav-title">The Concession Stand</span>
</nav>

<header>
  <div class="room-label">Intermission</div>
  <h1>Fill in the <em>Blank</em></h1>
  <div class="header-ornament">
    <div class="orn-line"></div>
    <div class="orn-diamond"></div>
    <div class="orn-line r"></div>
  </div>
  <p class="header-sub">A famous line. Your ending. Claude responds in character.</p>
</header>

<main>

  <div class="quote-nav">
    <div class="quote-count" id="quoteCount">Quote 1 of 30</div>
    <button class="shuffle-btn" id="shuffleBtn">Shuffle ✦</button>
  </div>

  <div class="quote-stage">
    <div class="quote-text" id="quoteText"></div>
    <div class="quote-source" id="quoteSource"></div>
  </div>

  <div class="submit-wrap">
    <button class="submit-btn" id="submitBtn">Submit Your Answer</button>
  </div>

  <div id="responseStage">
    <div class="response-card">
      <div class="response-speaker" id="responseSpeaker"></div>
      <div class="response-body" id="responseBody"></div>
    </div>
    <div id="revealPanel">
      <div class="reveal-label">The real answer</div>
      <div class="reveal-answer" id="revealAnswer"></div>
      <div class="reveal-film" id="revealFilm"></div>
    </div>
    <div id="nextWrap">
      <button class="next-btn" id="nextBtn">
        <div class="next-arrow"></div>
        Next Quote
      </button>
    </div>
  </div>

</main>

<footer>
  <div class="footer-mark">Adam's Cinema</div>
  <div class="footer-sub">Please silence your devices &nbsp;·&nbsp; No outside food or drink</div>
</footer>

<script>
  const ORACLE = 'https://oracle-proxy.adamrowe312.workers.dev';

  const QUOTES = [
    { before:"Here's looking at you,", blank:"kid", character:"Rick Blaine", actor:"Humphrey Bogart", film:"Casablanca", year:"1942" },
    { before:"You can't handle the", blank:"truth", character:"Colonel Jessup", actor:"Jack Nicholson", film:"A Few Good Men", year:"1992" },
    { before:"I'll be", blank:"back", character:"The Terminator", actor:"Arnold Schwarzenegger", film:"The Terminator", year:"1984" },
    { before:"You had me at", blank:"hello", character:"Dorothy Boyd", actor:"Renée Zellweger", film:"Jerry Maguire", year:"1996" },
    { before:"I see dead", blank:"people", character:"Cole Sear", actor:"Haley Joel Osment", film:"The Sixth Sense", year:"1999" },
    { before:"We're gonna need a bigger", blank:"boat", character:"Chief Brody", actor:"Roy Scheider", film:"Jaws", year:"1975" },
    { before:"Life is like a box of", blank:"chocolates", character:"Forrest Gump", actor:"Tom Hanks", film:"Forrest Gump", year:"1994" },
    { before:"Go ahead, make my", blank:"day", character:"Harry Callahan", actor:"Clint Eastwood", film:"Sudden Impact", year:"1983" },
    { before:"I am your", blank:"father", character:"Darth Vader", actor:"James Earl Jones", film:"The Empire Strikes Back", year:"1980" },
    { before:"There's no place like", blank:"home", character:"Dorothy", actor:"Judy Garland", film:"The Wizard of Oz", year:"1939" },
    { before:"Show me the", blank:"money", character:"Rod Tidwell", actor:"Cuba Gooding Jr.", film:"Jerry Maguire", year:"1996" },
    { before:"Get busy living, or get busy", blank:"dying", character:"Red", actor:"Morgan Freeman", film:"The Shawshank Redemption", year:"1994" },
    { before:"To infinity and", blank:"beyond", character:"Buzz Lightyear", actor:"Tim Allen", film:"Toy Story", year:"1995" },
    { before:"I'm the king of the", blank:"world", character:"Jack Dawson", actor:"Leonardo DiCaprio", film:"Titanic", year:"1997" },
    { before:"Say hello to my little", blank:"friend", character:"Tony Montana", actor:"Al Pacino", film:"Scarface", year:"1983" },
    { before:"Why so", blank:"serious", character:"The Joker", actor:"Heath Ledger", film:"The Dark Knight", year:"2008" },
    { before:"Houston, we have a", blank:"problem", character:"Jim Lovell", actor:"Tom Hanks", film:"Apollo 13", year:"1995" },
    { before:"I feel the need — the need for", blank:"speed", character:"Pete Mitchell", actor:"Tom Cruise", film:"Top Gun", year:"1986" },
    { before:"Nobody puts Baby in a", blank:"corner", character:"Johnny Castle", actor:"Patrick Swayze", film:"Dirty Dancing", year:"1987" },
    { before:"They may take our lives, but they'll never take our", blank:"freedom", character:"William Wallace", actor:"Mel Gibson", film:"Braveheart", year:"1995" },
    { before:"With great power comes great", blank:"responsibility", character:"Uncle Ben", actor:"Cliff Robertson", film:"Spider-Man", year:"2002" },
    { before:"Keep your friends close, but your enemies", blank:"closer", character:"Michael Corleone", actor:"Al Pacino", film:"The Godfather Part II", year:"1974" },
    { before:"May the Force be with", blank:"you", character:"Han Solo", actor:"Harrison Ford", film:"Star Wars", year:"1977" },
    { before:"I'll make him an offer he can't", blank:"refuse", character:"Vito Corleone", actor:"Marlon Brando", film:"The Godfather", year:"1972" },
    { before:"You is kind, you is smart, you is", blank:"important", character:"Aibileen Clark", actor:"Viola Davis", film:"The Help", year:"2011" },
    { before:"Bond. James", blank:"Bond", character:"James Bond", actor:"Sean Connery", film:"Dr. No", year:"1962" },
    { before:"Elementary, my dear", blank:"Watson", character:"Sherlock Holmes", actor:"Basil Rathbone", film:"The Adventures of Sherlock Holmes", year:"1939" },
    { before:"You either die a hero, or you live long enough to see yourself become the", blank:"villain", character:"Harvey Dent", actor:"Aaron Eckhart", film:"The Dark Knight", year:"2008" },
    { before:"I'll have what she's", blank:"having", character:"A diner patron", actor:"Estelle Reiner", film:"When Harry Met Sally...", year:"1989" },
    { before:"You can't sit with", blank:"us", character:"Regina George", actor:"Rachel McAdams", film:"Mean Girls", year:"2004" },
  ];

  let currentIndex = 0;
  let order = Array.from({length: QUOTES.length}, (_, i) => i);

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
  }

  shuffle(order);

  function currentQuote() { return QUOTES[order[currentIndex]]; }

  function renderQuote() {
    const q = currentQuote();
    const quoteEl = document.getElementById('quoteText');
    const sourceEl = document.getElementById('quoteSource');

    quoteEl.innerHTML = `&ldquo;${q.before}&nbsp;<input type="text" id="blankInput" class="blank-input" placeholder="your answer" autocomplete="off" spellcheck="false" maxlength="40">&rdquo;`;

    // Auto-resize input on typing
    const input = document.getElementById('blankInput');
    input.addEventListener('input', () => {
      const len = Math.max(input.value.length + 2, 8);
      input.style.width = len + 'ch';
    });
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') submitAnswer();
    });
    input.focus();

    sourceEl.textContent = '';
    document.getElementById('quoteCount').textContent = `Quote ${currentIndex + 1} of ${QUOTES.length}`;
    document.getElementById('responseStage').style.display = 'none';
    document.getElementById('revealPanel').style.display = 'none';
    document.getElementById('nextWrap').style.display = 'none';
    document.getElementById('submitBtn').disabled = false;
    document.getElementById('submitBtn').textContent = 'Submit Your Answer';
  }

  async function submitAnswer() {
    const input = document.getElementById('blankInput');
    const userAnswer = (input ? input.value.trim() : '');
    if (!userAnswer) { if (input) input.focus(); return; }

    const q = currentQuote();
    const submitBtn = document.getElementById('submitBtn');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Consulting the character…';

    // Lock input
    if (input) input.disabled = true;

    // Show response stage with loading
    const responseStage = document.getElementById('responseStage');
    responseStage.style.display = 'block';
    document.getElementById('responseSpeaker').textContent = `${q.character} — ${q.film}, ${q.year}`;
    document.getElementById('responseBody').innerHTML = '<div class="loading-msg">In character…</div>';

    const prompt = `You are ${q.character} from ${q.film} (${q.year}), played by ${q.actor}. A visitor to Adam's Cinema just tried to complete your famous line:

"${q.before} ___"

Their answer was: "${userAnswer}"

The real answer is: "${q.blank}"

Respond entirely in character — comment on their attempt with the personality and voice of ${q.character}. Be wry, amused, disappointed, affronted, or impressed as fits the character. Do NOT reveal the correct answer yourself (it will be shown separately). Keep your response to 2–3 sentences maximum. No emojis. No stage directions.`;

    try {
      const res = await fetch(ORACLE, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 200,
          messages: [{ role: 'user', content: prompt }]
        })
      });
      const data = await res.json();
      const text = (data.content && data.content.map(i => i.text || '').join('')) || 'The character is momentarily speechless.';
      typewriterReveal(text);
    } catch(e) {
      typewriterReveal('Even the character has no words for that one.');
    }
  }

  function typewriterReveal(text) {
    const bodyEl = document.getElementById('responseBody');
    bodyEl.innerHTML = '<span class="cursor-blink"></span>';
    const cursor = bodyEl.querySelector('.cursor-blink');
    let i = 0;
    const interval = setInterval(() => {
      if (i < text.length) {
        cursor.insertAdjacentText('beforebegin', text[i]);
        i++;
      } else {
        clearInterval(interval);
        cursor.remove();
        // Show reveal and next
        showReveal();
      }
    }, 22);
  }

  function showReveal() {
    const q = currentQuote();
    document.getElementById('revealAnswer').textContent = q.blank.toUpperCase();
    document.getElementById('revealFilm').textContent = `${q.film}, ${q.year} — ${q.character}`;
    document.getElementById('revealPanel').style.display = 'block';
    document.getElementById('nextWrap').style.display = 'block';
    document.getElementById('quoteText').innerHTML = `&ldquo;${q.before}&nbsp;<span style="color:var(--gold-bright);text-shadow:0 0 12px rgba(232,200,106,0.5)">${q.blank}</span>&rdquo;`;
  }

  function nextQuote() {
    currentIndex = (currentIndex + 1) % QUOTES.length;
    if (currentIndex === 0) shuffle(order);
    renderQuote();
  }

  document.getElementById('submitBtn').addEventListener('click', submitAnswer);
  document.getElementById('nextBtn').addEventListener('click', nextQuote);
  document.getElementById('shuffleBtn').addEventListener('click', () => {
    shuffle(order);
    currentIndex = 0;
    renderQuote();
  });

  renderQuote();
</script>

<script>
(function(){
  if(window.innerWidth<900)return;
  if(window.matchMedia('(prefers-reduced-motion:reduce)').matches)return;

  ['rail-l','rail-r'].forEach(function(c){
    var r=document.createElement('div');
    r.className='theatre-rail '+c;
    r.setAttribute('aria-hidden','true');
    r.innerHTML='<div class="rail-track"><div class="rail-fill"></div></div>'
               +'<div class="rail-marker"></div>'
               +'<div class="rail-glow"></div>';
    document.body.appendChild(r);
  });

  var fills=document.querySelectorAll('.rail-fill');
  var markers=document.querySelectorAll('.rail-marker');
  var glows=document.querySelectorAll('.rail-glow');

  function update(){
    var s=window.scrollY;
    var maxS=document.documentElement.scrollHeight-window.innerHeight;
    var p=maxS>0?Math.min(1,Math.max(0,s/maxS)):0;
    fills.forEach(function(f){f.style.height=(p*100)+'%';});
    var markerY=80+p*(window.innerHeight-160);
    markers.forEach(function(m){m.style.top=markerY+'px';});
    if(glows[0])glows[0].style.top=(8+p*54)+'%';
    if(glows[1])glows[1].style.top=(22+p*52)+'%';
  }

  window.addEventListener('scroll',update,{passive:true});
  window.addEventListener('resize',update,{passive:true});
  update();
})();
</script>

</body>
</html>
