<style>
.room-label { font-family:'Cinzel',serif; font-size:10px; letter-spacing:6px; color:var(--gold-dim); text-transform:uppercase; margin-bottom:20px; opacity:0; animation:fadeUp 0.8s ease forwards 0.2s; }
h1 { opacity:0; animation:fadeUp 0.8s ease forwards 0.4s; }
.header-ornament { opacity:0; animation:fadeUp 0.8s ease forwards 0.6s; }
.header-sub { opacity:0; animation:fadeUp 0.8s ease forwards 0.8s; }
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
main { max-width:800px; margin:0 auto; padding:64px 48px 140px; position:relative; z-index:2; }
/* ── Input stage ─────────────────────────────────────────────────── */
.input-stage { opacity:0; animation:fadeUp 0.7s ease forwards 1s; }
.film-inputs { display:grid; grid-template-columns:1fr 48px 1fr; align-items:end; gap:0; margin-bottom:40px; }
.film-input-group { display:flex; flex-direction:column; gap:8px; }
.film-input-label { font-family:'Cinzel',serif; font-size:8px; letter-spacing:4px; color:var(--gold); text-transform:uppercase; text-shadow:0 0 10px rgba(201,168,76,0.4); }
.film-input { font-family:'EB Garamond',Georgia,serif; font-style:italic; font-size:20px; color:var(--cream); background:rgba(26,8,16,0.35); border:none; border-bottom:1px solid rgba(201,168,76,0.3); padding:12px 8px; outline:none; width:100%; transition:border-color 0.3s; backdrop-filter:blur(8px); }
.film-input:focus { border-bottom-color:var(--gold); }
.film-input::placeholder { color:var(--cream-muted); font-style:normal; font-size:14px; font-family:'Cinzel',serif; letter-spacing:1px; }
.input-connector { display:flex; align-items:flex-end; justify-content:center; padding-bottom:14px; font-family:'EB Garamond',serif; font-size:24px; color:var(--gold-dim); }
.submit-wrap { text-align:center; margin-bottom:48px; }
.submit-btn { font-family:'Playfair Display',serif; font-style:italic; font-size:20px; color:var(--cream); background:none; border:1px solid var(--gold-dim); padding:16px 52px; cursor:pointer; transition:all 0.35s; position:relative; }
.submit-btn::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(201,168,76,0.06),rgba(107,15,26,0.1)); opacity:0; transition:opacity 0.35s; }
.submit-btn:hover:not(:disabled) { border-color:var(--gold); box-shadow:0 0 28px rgba(201,168,76,0.14); }
.submit-btn:hover:not(:disabled)::before { opacity:1; }
.submit-btn:disabled { opacity:0.4; cursor:not-allowed; }
/* ── Loading ──────────────────────────────────────────────────────── */
.loading-state { text-align:center; padding:60px 20px; font-family:'Cinzel',serif; font-size:9px; letter-spacing:5px; color:var(--gold-dim); text-transform:uppercase; animation:pulse 1.5s ease-in-out infinite; display:none; }
@keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
/* ── Chain ───────────────────────────────────────────────────────── */
#chainStage { display:none; }
.chain { display:flex; flex-direction:column; align-items:stretch; gap:0; }
.chain-node { display:flex; gap:24px; align-items:center; background:rgba(26,8,16,0.28); backdrop-filter:blur(14px) saturate(1.1); -webkit-backdrop-filter:blur(14px) saturate(1.1); border:1px solid rgba(201,168,76,0.16); padding:24px 28px; opacity:0; animation:fadeUp 0.5s ease forwards; box-shadow:inset 0 1px 0 rgba(255,255,255,0.04); transition:border-color 0.3s,box-shadow 0.3s; }
.chain-node:hover { border-color:rgba(201,168,76,0.35); box-shadow:inset 0 1px 0 rgba(255,255,255,0.06),0 0 24px rgba(201,168,76,0.12); }
.chain-node.endpoint { border-color:rgba(201,168,76,0.28); background:rgba(42,16,24,0.32); }
.cn-poster-wrap { width:68px; flex-shrink:0; }
.cn-poster { width:68px; height:102px; object-fit:cover; display:block; filter:saturate(0.75) brightness(0.88); border:1px solid rgba(201,168,76,0.15); transition:filter 0.3s; }
.chain-node:hover .cn-poster { filter:saturate(0.95) brightness(0.98); }
.cn-no-poster { width:68px; height:102px; background:rgba(26,8,16,0.6); border:1px solid rgba(201,168,76,0.1); display:flex; align-items:center; justify-content:center; color:rgba(201,168,76,0.15); font-size:22px; }
.cn-step { font-family:'Cinzel',serif; font-size:7px; letter-spacing:3px; color:var(--gold); text-transform:uppercase; margin-bottom:6px; text-shadow:0 0 8px rgba(201,168,76,0.4); }
.cn-title { font-family:'Playfair Display',serif; font-style:italic; font-size:22px; color:var(--cream); line-height:1.15; margin-bottom:5px; }
.cn-year { font-family:'Cinzel',serif; font-size:8.5px; letter-spacing:3px; color:var(--gold-dim); text-transform:uppercase; }
.chain-link { display:flex; flex-direction:column; align-items:center; padding:6px 0; opacity:0; animation:fadeUp 0.5s ease forwards; }
.cl-line { width:1px; height:18px; background:linear-gradient(180deg,rgba(201,168,76,0.35),rgba(201,168,76,0.6)); transform:scaleY(0); transform-origin:top center; animation:lineGrow 0.28s ease-out forwards var(--link-delay, 0s); }
@keyframes lineGrow {
  from { transform: scaleY(0); }
  to   { transform: scaleY(1); }
}
.cl-dot { width:5px; height:5px; border-radius:50%; background:var(--gold-dim); margin:2px 0; box-shadow:0 0 6px rgba(201,168,76,0.4); }
.cl-text { font-family:'EB Garamond',Georgia,serif; font-style:italic; font-size:16px; color:var(--cream-muted); text-align:center; padding:6px 48px; line-height:1.55; }
.cl-name { font-family:'Playfair Display',serif; font-size:14px; color:var(--cream-dim); letter-spacing:0.5px; margin-bottom:10px; opacity:0.85; }
.chain-history-mark { display:flex; align-items:center; justify-content:center; gap:14px; margin-bottom:20px; padding:14px 24px; background:rgba(15,5,8,0.45); border-left:1px solid rgba(201,168,76,0.35); border-right:1px solid rgba(201,168,76,0.35); font-family:'EB Garamond',serif; font-style:italic; font-size:13px; color:rgba(232,200,106,0.78); letter-spacing:0.3px; }
.chm-mark { color:var(--gold); font-size:14px; text-shadow:0 0 10px rgba(201,168,76,0.5); }
.cl-person-row { display:flex; align-items:center; gap:22px; max-width:640px; padding:6px 24px; }
.cl-portrait-wrap { width:78px; height:78px; flex-shrink:0; position:relative; }
.cl-portrait { width:78px; height:78px; border-radius:50%; object-fit:cover; object-position:50% 22%; display:block; border:1.5px solid rgba(201,168,76,0.35); box-shadow:0 0 0 1px rgba(15,5,8,0.7), 0 0 14px rgba(201,168,76,0.22), 0 0 28px rgba(201,168,76,0.08); filter:saturate(0.85) brightness(0.95); transition:filter 0.3s, box-shadow 0.3s, border-color 0.3s; }
.chain-link:hover .cl-portrait { filter:saturate(1) brightness(1); border-color:rgba(201,168,76,0.55); box-shadow:0 0 0 1px rgba(15,5,8,0.7), 0 0 18px rgba(201,168,76,0.4), 0 0 36px rgba(201,168,76,0.16); }
.cl-portrait-fallback { width:78px; height:78px; border-radius:50%; background:linear-gradient(135deg,rgba(42,16,24,0.92),rgba(15,5,8,0.96)); border:1.5px solid rgba(201,168,76,0.32); display:flex; align-items:center; justify-content:center; font-family:'Cinzel',serif; font-size:18px; letter-spacing:2px; color:var(--gold); text-shadow:0 0 10px rgba(201,168,76,0.4); box-shadow:0 0 12px rgba(201,168,76,0.16); }
.cl-person-row .cl-text { text-align:left; padding:0; flex:1; }
@media (max-width: 640px) {
  .cl-person-row { flex-direction:column; gap:14px; padding:6px 16px; }
  .cl-person-row .cl-text { text-align:center; }
}
/* ── Role badge ──────────────────────────────────────────────────── */
.cl-role { font-family:'Cinzel',serif; font-size:7px; letter-spacing:3px; text-transform:uppercase; margin-bottom:4px; opacity:0.9; }
.cl-role.role-director   { color:var(--gold); text-shadow:0 0 10px rgba(201,168,76,0.4); }
.cl-role.role-actor      { color:var(--cream-muted); }
.cl-role.role-screenplay { color:rgba(201,168,76,0.6); }
.cl-role.role-dp         { color:rgba(201,168,76,0.6); }
.cl-role.role-producer   { color:rgba(201,168,76,0.6); }
/* ── Try again ───────────────────────────────────────────────────── */
#tryAgainWrap { display:none; text-align:center; margin-top:48px; }
.try-again-btn { font-family:'Cinzel',serif; font-size:9px; letter-spacing:4px; color:var(--gold-dim); text-transform:uppercase; border:1px solid rgba(201,168,76,0.2); padding:12px 32px; background:none; cursor:pointer; transition:all 0.3s; display:inline-flex; align-items:center; gap:12px; }
.try-again-btn:hover { color:var(--gold); border-color:rgba(201,168,76,0.4); box-shadow:0 0 20px rgba(201,168,76,0.1); }
.try-line { width:18px; height:1px; background:currentColor; transition:width 0.3s; }
.try-again-btn:hover .try-line { width:28px; }
.error-msg { text-align:center; font-family:'Cinzel',serif; font-size:9px; letter-spacing:3px; color:var(--crimson-bright); text-transform:uppercase; padding:32px 0; display:none; }
footer { border-top:1px solid rgba(201,168,76,0.08); }
@media(max-width:640px) {
  main { padding:48px 24px 100px; }
  .film-inputs { grid-template-columns:1fr; gap:24px; }
  .input-connector { display:none; }
  .cl-text { padding:6px 16px; font-size:15px; }
  .cn-title { font-size:18px; }
}
</style>

<body>

<div class="ceiling"></div>
<div class="ceiling-glow"></div>

<nav class="nav">

    <div class="nav-back-line"></div>

  </a>

</nav>

<header>
  <div class="room-label">Four Degrees</div>
  <h1>Four <em>Degrees</em></h1>
  <div class="header-ornament">
    <div class="orn-line"></div>
    <div class="orn-diamond"></div>
    <div class="orn-line r"></div>
  </div>
  <p class="header-sub">Name two films. The archive traces the real chain connecting them — up to four degrees.</p>
</header>

<main>

  <div class="input-stage" id="inputStage">
    <div class="film-inputs">
      <div class="film-input-group">
        <div class="film-input-label">Film One</div>
        <input type="text" id="filmA" class="film-input" placeholder="e.g. Casablanca" autocomplete="off" spellcheck="false">
      </div>
      <div class="input-connector">↔</div>
      <div class="film-input-group">
        <div class="film-input-label">Film Two</div>
        <input type="text" id="filmB" class="film-input" placeholder="e.g. Blade Runner 2049" autocomplete="off" spellcheck="false">
      </div>

      <button class="submit-btn" id="submitBtn">Build the Chain</button>
    </div>

<script>
  const ORACLE = 'https://oracle-proxy.adamrowe312.workers.dev';
  const TMDB   = 'https://tmdb-proxy.adamrowe312.workers.dev';
  const IMG    = 'https://image.tmdb.org/t/p/w342';
  const PROFILE_IMG = 'https://image.tmdb.org/t/p/w185';

  const ROMAN = ['I','II','III','IV','V','VI','VII'];

  const CAST_TOP_N        = 15;
  const PREFERRED_JOBS    = ['Director','Screenplay','Writer','Director of Photography','Producer','Editor'];
  const POOL_CONCURRENCY  = 8;
  const FETCH_TIMEOUT_MS  = 15000;
  const CLAUDE_TIMEOUT_MS = 25000;
  const MIN_VOTE_COUNT    = 5;

  // Caches store resolved values only; rejections are never memoized (prevents poisoning on transient errors)
  const creditsCache     = new Map();
  const filmographyCache = new Map();

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
  }

  function setStatus(msg) {
    document.getElementById('loadingState').textContent = msg;
  }

  const sleep = ms => new Promise(r => setTimeout(r, ms));

  async function cachedFetch(cache, key, fetcher) {
    if (cache.has(key)) return cache.get(key);
    const value = await fetcher();
    cache.set(key, value);
    return value;
  }

  function normalizeName(s) {
    return String(s || '')
      .normalize('NFD').replace(/\p{M}/gu, '')
      .toLowerCase()
      .replace(/[^\w\s]/g, '')
      .replace(/\s+/g, ' ')
      .trim();
  }

  // ── TMDB helpers ────────────────────────────────────────────────────

  async function fetchWithRetry(url) {
    let res = await fetch(url, { signal: AbortSignal.timeout(FETCH_TIMEOUT_MS) });
    if (res.status === 429) {
      const raw = parseInt(res.headers.get('Retry-After') || '1', 10);
      const waitS = Math.min(Math.max(isNaN(raw) ? 1 : raw, 1), 5);
      await sleep(waitS * 1000);
      res = await fetch(url, { signal: AbortSignal.timeout(FETCH_TIMEOUT_MS) });
    }
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }

  async function resolveFilm(titleRaw) {
    const yearMatch = titleRaw.match(/\((\d{4})\)/);
    const clean = titleRaw.replace(/\s*\(\d{4}\)/, '').trim();
    const year  = yearMatch ? yearMatch[1] : '';
    const url = `${TMDB}/search/movie?query=${encodeURIComponent(clean)}${year ? `&primary_release_year=${year}` : ''}&include_adult=false`;
    const res = await fetch(url, { signal: AbortSignal.timeout(FETCH_TIMEOUT_MS) });
    if (!res.ok) return null;
    const data = await res.json();
    const results = data.results || [];
    if (!results.length) return null;
    const pick = results.find(m => m.poster_path) || results[0];
    return {
      id: pick.id,
      title: pick.title,
      year: pick.release_date ? pick.release_date.slice(0, 4) : year,
      poster_path: pick.poster_path
    };
  }

  async function fetchCredits(filmId) {
    return cachedFetch(creditsCache, filmId, async () => {
      const data = await fetchWithRetry(`${TMDB}/movie/${filmId}/credits`);
      const cast = (data.cast || [])
        .filter(p => p.order != null && p.order < CAST_TOP_N)
        .map(p => ({ id: p.id, name: p.name, profile_path: p.profile_path, job: 'Actor', role: 'cast', order: p.order }));
      const crew = (data.crew || [])
        .filter(p => PREFERRED_JOBS.includes(p.job))
        .map(p => ({ id: p.id, name: p.name, profile_path: p.profile_path, job: p.job, role: 'crew' }));
      // Dedupe by person id, crew wins so a director-who-cameos reads as Director
      const seen = new Set();
      const people = [];
      for (const p of [...crew, ...cast]) {
        if (!seen.has(p.id)) { seen.add(p.id); people.push(p); }
      }
      return people;
    });
  }

  async function fetchFilmography(personId, excludeFilmIds) {
    const films = await cachedFetch(filmographyCache, personId, async () => {
      const data = await fetchWithRetry(`${TMDB}/person/${personId}/movie_credits`);
      const byId = new Map();
      const keep = (entry, job, role, order) => {
        if (!entry || !entry.id) return;
        if (entry.adult) return;
        if (entry.video) return;
        if (!entry.release_date) return;
        if ((entry.vote_count || 0) < MIN_VOTE_COUNT) return;
        const prev = byId.get(entry.id);
        // Per-person: prefer crew credit over cast when both exist (stronger narration material)
        if (prev && prev.role === 'crew' && role === 'cast') return;
        byId.set(entry.id, {
          id: entry.id,
          title: entry.title,
          year: entry.release_date.slice(0, 4),
          poster_path: entry.poster_path,
          vote_count: entry.vote_count || 0,
          popularity: entry.popularity || 0,
          job,
          role,
          order
        });
      };
      for (const c of (data.cast || [])) keep(c, 'Actor', 'cast', c.order);
      for (const c of (data.crew || [])) if (PREFERRED_JOBS.includes(c.job)) keep(c, c.job, 'crew', null);
      return Array.from(byId.values());
    });
    return films.filter(f => !excludeFilmIds.has(f.id));
  }

  // ── Concurrency pool: worker-loop; Promise.allSettled semantics ──────

  async function promisePool(tasks, concurrency = POOL_CONCURRENCY) {
    const results = new Array(tasks.length);
    let next = 0;
    const worker = async () => {
      while (true) {
        const i = next++;
        if (i >= tasks.length) return;
        try {
          results[i] = { status: 'fulfilled', value: await tasks[i]() };
        } catch (reason) {
          results[i] = { status: 'rejected', reason };
        }
      }
    };
    const n = Math.min(concurrency, tasks.length);
    await Promise.all(Array.from({ length: n }, worker));
    return results;
  }

  // ── Path scoring ─────────────────────────────────────────────────────

  function roleWeight(job, order) {
    if (job === 'Director') return 100;
    if (job === 'Screenplay' || job === 'Writer') return 70;
    if (job === 'Producer') return 50;
    if (job === 'Director of Photography') return 45;
    if (job === 'Editor') return 40;
    if (job === 'Actor') return (order != null && order <= 2) ? 80 : 30;
    return 20;
  }

  function scoreCandidate(personA, personB, film) {
    const filmScore = (film.vote_count || 0) * Math.sqrt(film.popularity || 0) / 100;
    return roleWeight(personA.job, personA.order) + roleWeight(personB.job, personB.order) + filmScore;
  }

  // ── 1-hop direct intersection ────────────────────────────────────────

  function directIntersection(creditsA, creditsB) {
    const idsB = new Set(creditsB.map(p => p.id));
    let best = null, bestScore = -1;
    for (const pA of creditsA) {
      if (!idsB.has(pA.id)) continue;
      const s = roleWeight(pA.job, pA.order);
      if (s > bestScore) { bestScore = s; best = pA; }
    }
    return best;
  }

  // ── 2-hop two-sided BFS ──────────────────────────────────────────────

  async function twoSidedBFS(creditsA, creditsB, filmIdA, filmIdB) {
    const excludeSet = new Set([filmIdA, filmIdB]);
    const meta = [
      ...creditsA.map(p => ({ side: 'A', person: p })),
      ...creditsB.map(p => ({ side: 'B', person: p }))
    ];
    const tasks = meta.map(m => () => fetchFilmography(m.person.id, excludeSet));
    const results = await promisePool(tasks, POOL_CONCURRENCY);

    // filmId -> [{ person, film }, ...] for each side
    const reachA = new Map();
    const reachB = new Map();
    results.forEach((r, i) => {
      if (r.status !== 'fulfilled') return;
      const { side, person } = meta[i];
      const bucket = side === 'A' ? reachA : reachB;
      for (const film of r.value) {
        if (!bucket.has(film.id)) bucket.set(film.id, []);
        bucket.get(film.id).push({ person, film });
      }
    });

    let best = null, bestScore = -1;
    for (const [filmId, entriesA] of reachA) {
      const entriesB = reachB.get(filmId);
      if (!entriesB) continue;
      for (const eA of entriesA) {
        for (const eB of entriesB) {
          // Same person connecting would be a 1-hop case, already handled upstream
          if (eA.person.id === eB.person.id) continue;
          const s = scoreCandidate(eA.person, eB.person, eA.film);
          if (s > bestScore) {
            bestScore = s;
            best = { intermFilm: eA.film, personA: eA.person, personB: eB.person };
          }
        }
      }
    }
    return best;
  }

  // ── 3-hop Claude fallback (propose + verify) ─────────────────────────

  async function claudePropose3Hop(filmA, filmB, hint) {
    const retryNote = hint ? `\nA previous attempt failed: ${hint}. Try different real people or films.` : '';
    const prompt = `You are connecting two films via real shared collaborators verifiable through TMDB. A direct 1-hop match and a 2-hop BFS through TMDB filmographies have both failed, so propose a 3-hop path (two intermediate films, three connecting people).

Film A: "${filmA.title}" (${filmA.year})
Film B: "${filmB.title}" (${filmB.year})
${retryNote}

Names must match TMDB credits exactly (no nicknames, no initials, full credited name).
Respond in EXACTLY this format — no other text:

PATH:
PERSON1: [exact full name as credited in TMDB]
ROLE1: [role in Film A: Actor|Director|Screenplay|Writer|Producer|Director of Photography|Editor]
INTERM1: [first intermediate film title]
PERSON2: [second person's exact full name]
ROLE2: [person2's role in INTERM1]
INTERM2: [second intermediate film title]
PERSON3: [third person's exact full name]
ROLE3: [person3's role in Film B]`;

    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), CLAUDE_TIMEOUT_MS);
    try {
      const res = await fetch(ORACLE, {
        signal: controller.signal,
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 250,
          messages: [{ role: 'user', content: prompt }]
        })
      });
      if (!res.ok) throw new Error('oracle');
      const data = await res.json();
      return data.content[0].text;
    } finally {
      clearTimeout(timer);
    }
  }

  function parse3HopSuggestion(text) {
    const section = text.match(/PATH:([\s\S]*)/);
    if (!section) return null;
    const lines = section[1].split('\n').map(l => l.trim()).filter(Boolean);
    const get = (k) => {
      const l = lines.find(x => x.startsWith(k + ':'));
      return l ? l.slice(k.length + 1).trim() : null;
    };
    const s = {
      person1: get('PERSON1'), role1: get('ROLE1'),
      interm1: get('INTERM1'),
      person2: get('PERSON2'), role2: get('ROLE2'),
      interm2: get('INTERM2'),
      person3: get('PERSON3'), role3: get('ROLE3')
    };
    if (!s.person1 || !s.interm1 || !s.person2 || !s.interm2 || !s.person3) return null;
    return s;
  }

  function findPersonExact(credits, name) {
    const target = normalizeName(name);
    if (!target) return null;
    return credits.find(p => normalizeName(p.name) === target) || null;
  }

  async function verify3Hop(s, filmA, filmB, creditsA, creditsB) {
    const pAfilmA = findPersonExact(creditsA, s.person1);
    if (!pAfilmA) return { verified: false, reason: `"${s.person1}" not found in credits of "${filmA.title}"` };

    let interm1 = null, interm2 = null;
    try { interm1 = await resolveFilm(s.interm1); } catch(_) {}
    try { interm2 = await resolveFilm(s.interm2); } catch(_) {}
    if (!interm1) return { verified: false, reason: `Film "${s.interm1}" not found in TMDB` };
    if (!interm2) return { verified: false, reason: `Film "${s.interm2}" not found in TMDB` };
    if (interm1.id === filmA.id || interm1.id === filmB.id) {
      return { verified: false, reason: `Intermediate film "${s.interm1}" is one of the endpoints` };
    }
    if (interm2.id === filmA.id || interm2.id === filmB.id || interm2.id === interm1.id) {
      return { verified: false, reason: `Intermediate film "${s.interm2}" is not distinct` };
    }

    let cInterm1, cInterm2;
    try {
      [cInterm1, cInterm2] = await Promise.all([fetchCredits(interm1.id), fetchCredits(interm2.id)]);
    } catch(_) {
      return { verified: false, reason: 'Could not fetch credits for intermediate films' };
    }

    const p1inInterm1 = findPersonExact(cInterm1, s.person1);
    if (!p1inInterm1) return { verified: false, reason: `"${s.person1}" not found in "${interm1.title}"` };

    const p2inInterm1 = findPersonExact(cInterm1, s.person2);
    const p2inInterm2 = findPersonExact(cInterm2, s.person2);
    if (!p2inInterm1 || !p2inInterm2) {
      return { verified: false, reason: `"${s.person2}" not found bridging "${interm1.title}" and "${interm2.title}"` };
    }

    const p3inInterm2 = findPersonExact(cInterm2, s.person3);
    const p3inB       = findPersonExact(creditsB, s.person3);
    if (!p3inInterm2 || !p3inB) {
      return { verified: false, reason: `"${s.person3}" not found connecting "${interm2.title}" to "${filmB.title}"` };
    }

    const personNode = (match, roleHint) => {
      const job = PREFERRED_JOBS.includes(roleHint) ? roleHint : (roleHint === 'Actor' ? 'Actor' : match.job);
      return {
        type: 'person',
        id: match.id,
        name: match.name,
        profile_path: match.profile_path,
        job,
        role: PREFERRED_JOBS.includes(job) ? 'crew' : 'cast'
      };
    };

    return {
      verified: true,
      path: [
        { type: 'film', ...filmA },
        personNode(pAfilmA, s.role1),
        { type: 'film', ...interm1 },
        personNode(p2inInterm1, s.role2),
        { type: 'film', ...interm2 },
        personNode(p3inB, s.role3),
        { type: 'film', ...filmB }
      ]
    };
  }

  // ── Claude narration for an already-verified path ────────────────────

  async function narrateVerifiedPath(path) {
    const people = path.filter(n => n.type === 'person');
    const films  = path.filter(n => n.type === 'film');
    if (!people.length) return [];

    const pairs = people.map((p, i) => {
      const fL = films[i], fR = films[i + 1];
      return `${i + 1}. ${p.name} — ${p.job} — linking "${fL.title}" (${fL.year}) and "${fR.title}" (${fR.year})`;
    }).join('\n');

    const format = people.map((_, i) => `${i + 1}. [sentence]`).join('\n');

    const prompt = `You are the Oracle — an elegant cinema historian. A chain of TMDB-verified credits has been assembled between two films. Narrate each link in exactly one short, poised sentence.

Connections (already verified — do not question them):
${pairs}

Output EXACTLY ${people.length} numbered sentence${people.length > 1 ? 's' : ''}, one per connection. Each sentence must mention the person's role and both film titles they link. Elegant, concise, one line each. No preamble, no closing. Format:
${format}`;

    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), CLAUDE_TIMEOUT_MS);
    try {
      const res = await fetch(ORACLE, {
        signal: controller.signal,
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 180,
          messages: [{ role: 'user', content: prompt }]
        })
      });
      if (!res.ok) throw new Error('oracle');
      const data = await res.json();
      const text = data.content[0].text;
      const lines = text.trim().split('\n')
        .map(l => l.replace(/^\s*\d+[\.\)]\s*/, '').trim())
        .filter(Boolean);
      if (lines.length >= people.length) return lines.slice(0, people.length);
      return people.map((p, i) => lines[i] || fallbackNarration(p, films[i], films[i + 1]));
    } catch(_) {
      return people.map((p, i) => fallbackNarration(p, films[i], films[i + 1]));
    } finally {
      clearTimeout(timer);
    }
  }

  function fallbackNarration(person, filmLeft, filmRight) {
    const article = 'aeiou'.includes(person.job[0].toLowerCase()) ? 'an' : 'a';
    return `${person.name} served as ${article} ${person.job} on both ${filmLeft.title} and ${filmRight.title}, linking them through shared craft.`;
  }

  // ── Claude deep fallback — used when strict 3-hop verify cannot validate ─

  async function claudeDeepFallback(filmA, filmB) {
    const prompt = `The strict TMDB graph search has failed to find a connection between two films within 3 hops. Use your knowledge of cinema to trace a real connection through 3 to 5 shared collaborators (actors, directors, writers, producers, cinematographers, editors).

Film A: "${filmA.title}" (${filmA.year})
Film B: "${filmB.title}" (${filmB.year})

Use real, credited collaborations between professionals who actually worked together. Use exact credited names — no nicknames, no initials.

Respond ONLY with valid JSON. No markdown fences, no preamble:
{
  "films": [
    { "title": "Film A Title", "year": ${filmA.year || 0} },
    { "title": "Intermediate Film", "year": 0 },
    { "title": "Film B Title", "year": ${filmB.year || 0} }
  ],
  "people": [
    { "name": "Person Name", "role": "Director|Actor|Screenplay|Writer|Producer|Director of Photography|Editor", "narration": "One sentence, 14-22 words, evocative present-tense prose linking this person across the two adjacent films, in the voice of an elegant cinema oracle." }
  ]
}

Rules:
- films[0] is Film A, films[last] is Film B
- people.length must equal films.length - 1
- Each people[i] worked on BOTH films[i] AND films[i+1]
- Aim for 3 person-hops; use up to 5 only if necessary`;

    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), CLAUDE_TIMEOUT_MS);
    try {
      const res = await fetch(ORACLE, {
        signal: controller.signal,
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 900,
          messages: [{ role: 'user', content: prompt }]
        })
      });
      if (!res.ok) return null;
      const data = await res.json();
      const text = (data.content || []).map(c => c.text || '').join('');
      const match = text.match(/\{[\s\S]*\}/);
      if (!match) return null;
      const parsed = JSON.parse(match[0]);
      if (!parsed || !Array.isArray(parsed.films) || !Array.isArray(parsed.people)) return null;
      if (parsed.films.length < 2 || parsed.people.length !== parsed.films.length - 1) return null;
      return parsed;
    } catch(_) {
      return null;
    } finally {
      clearTimeout(timer);
    }
  }

  // Best-effort TMDB enrichment for posters and headshots — failures are non-fatal
  async function enrichDeepFallback(deep, filmA, filmB) {
    const films = deep.films.map(f => ({ title: f.title, year: f.year, id: null, poster_path: null }));
    films[0] = { title: filmA.title, year: filmA.year, id: filmA.id, poster_path: filmA.poster_path };
    films[films.length - 1] = { title: filmB.title, year: filmB.year, id: filmB.id, poster_path: filmB.poster_path };

    const filmTasks = [];
    for (let i = 1; i < films.length - 1; i++) {
      const f = films[i];
      filmTasks.push((async () => {
        const real = await resolveFilm(`${f.title}${f.year ? ' (' + f.year + ')' : ''}`).catch(() => null);
        if (real) films[i] = { title: real.title, year: real.year, id: real.id, poster_path: real.poster_path };
      })());
    }

    const people = deep.people.map(p => ({ name: p.name, role: p.role, narration: p.narration, id: null, profile_path: null }));
    const personTasks = people.map((p, idx) => (async () => {
      try {
        const url = `${TMDB}/search/person?query=${encodeURIComponent(p.name)}&include_adult=false`;
        const res = await fetch(url, { signal: AbortSignal.timeout(FETCH_TIMEOUT_MS) });
        if (!res.ok) return;
        const data = await res.json();
        const hit = (data.results || []).find(r => r.profile_path) || (data.results || [])[0];
        if (hit) { people[idx].id = hit.id; people[idx].profile_path = hit.profile_path; }
      } catch(_) {}
    })());

    await Promise.allSettled([...filmTasks, ...personTasks]);
    return { films, people };
  }

  function buildDeepPath(enriched) {
    const path = [];
    for (let i = 0; i < enriched.films.length; i++) {
      const f = enriched.films[i];
      path.push({ type: 'film', id: f.id, title: f.title, year: f.year, poster_path: f.poster_path });
      if (i < enriched.people.length) {
        const p = enriched.people[i];
        path.push({
          type: 'person',
          id: p.id,
          name: p.name,
          profile_path: p.profile_path,
          job: p.role,
          role: PREFERRED_JOBS.includes(p.role) ? 'crew' : 'cast'
        });
      }
    }
    return path;
  }

  // ── Render (preserved from original) ─────────────────────────────────

  function roleClass(job) {
    const j = (job || '').toLowerCase();
    if (j === 'director')                return 'role-director';
    if (j === 'actor')                   return 'role-actor';
    if (j === 'screenplay' || j === 'writer') return 'role-screenplay';
    if (j === 'director of photography') return 'role-dp';
    if (j === 'producer' || j === 'editor')   return 'role-producer';
    return 'role-actor';
  }

  function buildFilmNodeHTML(node, filmIndex, totalFilms, animIndex) {
    const isEndpoint = filmIndex === 0 || filmIndex === totalFilms - 1;
    const poster = node.poster_path
      ? `<img class="cn-poster" src="${IMG}${node.poster_path}" alt="" loading="lazy" onerror="this.parentElement.innerHTML='<div class=cn-no-poster>✦</div>'">`
      : '<div class="cn-no-poster">✦</div>';
    return `
      <div class="chain-node${isEndpoint ? ' endpoint' : ''}" style="animation-delay:${animIndex * 0.18}s">
        <div class="cn-poster-wrap">${poster}</div>
        <div>
          <div class="cn-step">${ROMAN[filmIndex] || filmIndex + 1}</div>
          <div class="cn-title">${esc(node.title)}</div>
          <div class="cn-year">${esc(node.year)}</div>
        </div>
      </div>`;
  }

  function initialsFor(name) {
    const parts = String(name || '').trim().split(/\s+/).filter(Boolean);
    if (!parts.length) return '?';
    const first = (parts[0][0] || '').toUpperCase();
    const last  = parts.length > 1 ? (parts[parts.length - 1][0] || '').toUpperCase() : '';
    return ((first + last).replace(/[^A-Z]/g, '') || '?');
  }

  function buildPersonLinkHTML(node, narration, animIndex) {
    const rc = roleClass(node.job);
    const d = `${animIndex * 0.18 + 0.09}s`;
    const inits = initialsFor(node.name);
    const portrait = node.profile_path
      ? `<img class="cl-portrait" src="${PROFILE_IMG}${node.profile_path}" alt="${esc(node.name)}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=cl-portrait-fallback>${inits}</div>'">`
      : `<div class="cl-portrait-fallback">${inits}</div>`;
    return `
      <div class="chain-link" style="animation-delay:${d}; --link-delay:${d}">
        <div class="cl-line"></div>
        <div class="cl-dot"></div>
        <div class="cl-role ${rc}">${esc(node.job)}</div>
        <div class="cl-name">${esc(node.name)}</div>
        <div class="cl-person-row">
          <div class="cl-portrait-wrap">${portrait}</div>
          <div class="cl-text">${esc(narration || node.name)}</div>
        </div>
        <div class="cl-dot"></div>
        <div class="cl-line"></div>
      </div>`;
  }

  function renderChain(path, narration, opts) {
    document.getElementById('loadingState').style.display = 'none';
    const container = document.getElementById('chain');
    container.innerHTML = '';

    if (opts && opts.sourcedFromHistory) {
      container.insertAdjacentHTML('beforeend',
        `<div class="chain-history-mark">
           <span class="chm-mark">⟡</span>
           <span class="chm-text">Traced through cinema history — beyond the strict TMDB graph</span>
         </div>`);
    }

    const filmNodes = path.filter(n => n.type === 'film');
    const totalFilms = filmNodes.length;
    let filmIndex = 0;
    let animIndex = 0;
    let narrationIdx = 0;

    path.forEach((node) => {
      if (node.type === 'film') {
        container.insertAdjacentHTML('beforeend', buildFilmNodeHTML(node, filmIndex, totalFilms, animIndex));
        filmIndex++;
        animIndex++;
      } else if (node.type === 'person') {
        const prose = narration[narrationIdx] || '';
        narrationIdx++;
        container.insertAdjacentHTML('beforeend', buildPersonLinkHTML(node, prose, animIndex));
        animIndex++;
      }
    });

    document.getElementById('chainStage').style.display = 'block';
    document.getElementById('tryAgainWrap').style.display = 'block';
  }

  // ── Path builders ────────────────────────────────────────────────────

  function build1HopPath(filmA, filmB, person) {
    const role = PREFERRED_JOBS.includes(person.job) ? 'crew' : 'cast';
    return [
      { type: 'film', ...filmA },
      { type: 'person', id: person.id, name: person.name, profile_path: person.profile_path, job: person.job, role },
      { type: 'film', ...filmB }
    ];
  }

  function build2HopPath(filmA, filmB, candidate) {
    const pA = candidate.personA, pB = candidate.personB, f = candidate.intermFilm;
    return [
      { type: 'film', ...filmA },
      { type: 'person', id: pA.id, name: pA.name, profile_path: pA.profile_path, job: pA.job,
        role: PREFERRED_JOBS.includes(pA.job) ? 'crew' : 'cast' },
      { type: 'film', id: f.id, title: f.title, year: f.year, poster_path: f.poster_path },
      { type: 'person', id: pB.id, name: pB.name, profile_path: pB.profile_path, job: pB.job,
        role: PREFERRED_JOBS.includes(pB.job) ? 'crew' : 'cast' },
      { type: 'film', ...filmB }
    ];
  }

  // ── Main orchestrator ────────────────────────────────────────────────

  async function buildChain() {
    const filmAInput = document.getElementById('filmA').value.trim();
    const filmBInput = document.getElementById('filmB').value.trim();
    if (!filmAInput || !filmBInput) {
      document.getElementById('filmA').focus();
      return;
    }

    document.getElementById('submitBtn').disabled = true;
    document.getElementById('errorMsg').style.display   = 'none';
    document.getElementById('chainStage').style.display = 'none';
    document.getElementById('tryAgainWrap').style.display = 'none';
    document.getElementById('chain').innerHTML = '';
    document.getElementById('loadingState').style.display = 'block';

    try {
      setStatus('Searching the archives...');
      const [filmA, filmB] = await Promise.all([resolveFilm(filmAInput), resolveFilm(filmBInput)]);
      if (!filmA || !filmB) throw new Error('not-found');
      if (filmA.id === filmB.id) throw new Error('same-film');

      setStatus('Reading the credits...');
      const [creditsA, creditsB] = await Promise.all([fetchCredits(filmA.id), fetchCredits(filmB.id)]);
      if (!creditsA.length || !creditsB.length) throw new Error('no-credits');

      const direct = directIntersection(creditsA, creditsB);
      if (direct) {
        setStatus('Consulting the oracle...');
        const path = build1HopPath(filmA, filmB, direct);
        const narration = await narrateVerifiedPath(path);
        renderChain(path, narration);
        return;
      }

      setStatus('Tracing the connection...');
      const twoHop = await twoSidedBFS(creditsA, creditsB, filmA.id, filmB.id);
      if (twoHop) {
        setStatus('Consulting the oracle...');
        const path = build2HopPath(filmA, filmB, twoHop);
        const narration = await narrateVerifiedPath(path);
        renderChain(path, narration);
        return;
      }

      setStatus('Consulting the oracle...');
      let suggestionText = await claudePropose3Hop(filmA, filmB);
      let suggestion     = parse3HopSuggestion(suggestionText);
      setStatus('Verifying the connection...');
      let result = suggestion ? await verify3Hop(suggestion, filmA, filmB, creditsA, creditsB) : null;

      if (!result || !result.verified) {
        const hint = (result && result.reason) ? result.reason : 'previous suggestion could not be parsed or verified';
        setStatus('Searching deeper...');
        suggestionText = await claudePropose3Hop(filmA, filmB, hint);
        suggestion     = parse3HopSuggestion(suggestionText);
        setStatus('Verifying the connection...');
        result = suggestion ? await verify3Hop(suggestion, filmA, filmB, creditsA, creditsB) : null;
      }

      if (!result || !result.verified) {
        setStatus('Tracing through cinema history...');
        const deep = await claudeDeepFallback(filmA, filmB);
        if (deep) {
          setStatus('Resolving collaborators...');
          const enriched = await enrichDeepFallback(deep, filmA, filmB);
          const path = buildDeepPath(enriched);
          const narration = deep.people.map(p => p.narration || '');
          renderChain(path, narration, { sourcedFromHistory: true });
          return;
        }
        throw new Error('no-path');
      }

      setStatus('Consulting the oracle...');
      const narration = await narrateVerifiedPath(result.path);
      renderChain(result.path, narration);

    } catch(e) {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('submitBtn').disabled = false;
      const errEl = document.getElementById('errorMsg');
      const msg = e.message === 'not-found'
        ? 'Film not recognised — check the title and try again'
        : e.message === 'same-film'
        ? 'Please enter two different films'
        : e.message === 'no-credits'
        ? 'No credits available for one of the films — try a different title'
        : e.message === 'no-path'
        ? 'No verified connection found — try a different pair of films'
        : 'Something went wrong — please try again';
      errEl.textContent = msg;
      errEl.style.display = 'block';
    }
  }

  function reset() {
    creditsCache.clear();
    filmographyCache.clear();
    document.getElementById('filmA').value = '';
    document.getElementById('filmB').value = '';
    document.getElementById('chain').innerHTML = '';
    document.getElementById('chainStage').style.display = 'none';
    document.getElementById('tryAgainWrap').style.display = 'none';
    document.getElementById('errorMsg').style.display = 'none';
    document.getElementById('submitBtn').disabled = false;
    document.getElementById('filmA').focus();
  }

  document.getElementById('submitBtn').addEventListener('click', buildChain);
  document.getElementById('tryAgainBtn').addEventListener('click', reset);
  document.getElementById('filmB').addEventListener('keydown', e => { if (e.key === 'Enter') buildChain(); });
  document.getElementById('filmA').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('filmB').focus(); });
</script>

<script>
(function(){
  if(window.innerWidth<900)return;
  if(window.matchMedia('(prefers-reduced-motion:reduce)').matches)return;
  ['rail-l','rail-r'].forEach(function(c){
    var r=document.createElement('div');
    r.className='theatre-rail '+c;
    r.setAttribute('aria-hidden','true');
    r.innerHTML='<div class="rail-track"><div class="rail-fill"></div></div>'
               +'<div class="rail-marker"></div>'
               +'<div class="rail-glow"></div>';
    document.body.appendChild(r);
  });
  var fills=document.querySelectorAll('.rail-fill');
  var markers=document.querySelectorAll('.rail-marker');
  var glows=document.querySelectorAll('.rail-glow');
  function update(){
    var s=window.scrollY,maxS=document.documentElement.scrollHeight-window.innerHeight;
    var p=maxS>0?Math.min(1,Math.max(0,s/maxS)):0;
    fills.forEach(function(f){f.style.height=(p*100)+'%';});
    markers.forEach(function(m){m.style.top=(80+p*(window.innerHeight-160))+'px';});
    if(glows[0])glows[0].style.top=(8+p*54)+'%';
    if(glows[1])glows[1].style.top=(22+p*52)+'%';
  }
  window.addEventListener('scroll',update,{passive:true});
  window.addEventListener('resize',update,{passive:true});
  update();
})();
</script>
