<style>
.room-label { font-family:'Cinzel',serif; font-size:10px; letter-spacing:6px; color:var(--gold-dim); text-transform:uppercase; margin-bottom:20px; opacity:0; animation:fadeUp 0.8s ease forwards 0.2s; }
h1 { opacity:0; animation:fadeUp 0.8s ease forwards 0.4s; }
.header-ornament { opacity:0; animation:fadeUp 0.8s ease forwards 0.6s; }
.header-sub { opacity:0; animation:fadeUp 0.8s ease forwards 0.8s; }
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
main { max-width:800px; margin:0 auto; padding:64px 48px 140px; position:relative; z-index:2; }
/* ── Input stage ─────────────────────────────────────────────────── */
.input-stage { opacity:0; animation:fadeUp 0.7s ease forwards 1s; }
.film-inputs { display:grid; grid-template-columns:1fr 48px 1fr; align-items:end; gap:0; margin-bottom:40px; }
.film-input-group { display:flex; flex-direction:column; gap:8px; }
.film-input-label { font-family:'Cinzel',serif; font-size:8px; letter-spacing:4px; color:var(--gold); text-transform:uppercase; text-shadow:0 0 10px rgba(201,168,76,0.4); }
.film-input { font-family:'EB Garamond',Georgia,serif; font-style:italic; font-size:20px; color:var(--cream); background:rgba(26,8,16,0.35); border:none; border-bottom:1px solid rgba(201,168,76,0.3); padding:12px 8px; outline:none; width:100%; transition:border-color 0.3s; backdrop-filter:blur(8px); }
.film-input:focus { border-bottom-color:var(--gold); }
.film-input::placeholder { color:var(--cream-muted); font-style:normal; font-size:14px; font-family:'Cinzel',serif; letter-spacing:1px; }
.input-connector { display:flex; align-items:flex-end; justify-content:center; padding-bottom:14px; font-family:'EB Garamond',serif; font-size:24px; color:var(--gold-dim); }
.submit-wrap { text-align:center; margin-bottom:48px; }
.submit-btn { font-family:'Playfair Display',serif; font-style:italic; font-size:20px; color:var(--cream); background:none; border:1px solid var(--gold-dim); padding:16px 52px; cursor:pointer; transition:all 0.35s; position:relative; }
.submit-btn::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(201,168,76,0.06),rgba(107,15,26,0.1)); opacity:0; transition:opacity 0.35s; }
.submit-btn:hover:not(:disabled) { border-color:var(--gold); box-shadow:0 0 28px rgba(201,168,76,0.14); }
.submit-btn:hover:not(:disabled)::before { opacity:1; }
.submit-btn:disabled { opacity:0.4; cursor:not-allowed; }
/* ── Loading ──────────────────────────────────────────────────────── */
.loading-state { text-align:center; padding:60px 20px; font-family:'Cinzel',serif; font-size:9px; letter-spacing:5px; color:var(--gold-dim); text-transform:uppercase; animation:pulse 1.5s ease-in-out infinite; display:none; }
@keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
/* ── Chain ───────────────────────────────────────────────────────── */
#chainStage { display:none; }
.chain { display:flex; flex-direction:column; align-items:stretch; gap:0; }
.chain-node { display:flex; gap:24px; align-items:center; background:rgba(26,8,16,0.28); backdrop-filter:blur(14px) saturate(1.1); -webkit-backdrop-filter:blur(14px) saturate(1.1); border:1px solid rgba(201,168,76,0.16); padding:24px 28px; opacity:0; animation:fadeUp 0.5s ease forwards; box-shadow:inset 0 1px 0 rgba(255,255,255,0.04); transition:border-color 0.3s,box-shadow 0.3s; }
.chain-node:hover { border-color:rgba(201,168,76,0.35); box-shadow:inset 0 1px 0 rgba(255,255,255,0.06),0 0 24px rgba(201,168,76,0.12); }
.chain-node.endpoint { border-color:rgba(201,168,76,0.28); background:rgba(42,16,24,0.32); }
.cn-poster-wrap { width:68px; flex-shrink:0; }
.cn-poster { width:68px; height:102px; object-fit:cover; display:block; filter:saturate(0.75) brightness(0.88); border:1px solid rgba(201,168,76,0.15); transition:filter 0.3s; }
.chain-node:hover .cn-poster { filter:saturate(0.95) brightness(0.98); }
.cn-no-poster { width:68px; height:102px; background:rgba(26,8,16,0.6); border:1px solid rgba(201,168,76,0.1); display:flex; align-items:center; justify-content:center; color:rgba(201,168,76,0.15); font-size:22px; }
.cn-step { font-family:'Cinzel',serif; font-size:7px; letter-spacing:3px; color:var(--gold); text-transform:uppercase; margin-bottom:6px; text-shadow:0 0 8px rgba(201,168,76,0.4); }
.cn-title { font-family:'Playfair Display',serif; font-style:italic; font-size:22px; color:var(--cream); line-height:1.15; margin-bottom:5px; }
.cn-year { font-family:'Cinzel',serif; font-size:8.5px; letter-spacing:3px; color:var(--gold-dim); text-transform:uppercase; }
.chain-link { display:flex; flex-direction:column; align-items:center; padding:6px 0; opacity:0; animation:fadeUp 0.5s ease forwards; }
.cl-line { width:1px; height:18px; background:linear-gradient(180deg,rgba(201,168,76,0.35),rgba(201,168,76,0.6)); transform:scaleY(0); transform-origin:top center; animation:lineGrow 0.28s ease-out forwards var(--link-delay, 0s); }
@keyframes lineGrow {
  from { transform: scaleY(0); }
  to   { transform: scaleY(1); }
}
.cl-dot { width:5px; height:5px; border-radius:50%; background:var(--gold-dim); margin:2px 0; box-shadow:0 0 6px rgba(201,168,76,0.4); }
.cl-text { font-family:'EB Garamond',Georgia,serif; font-style:italic; font-size:16px; color:var(--cream-muted); text-align:center; padding:6px 48px; line-height:1.55; }
/* ── Role badge ──────────────────────────────────────────────────── */
.cl-role { font-family:'Cinzel',serif; font-size:7px; letter-spacing:3px; text-transform:uppercase; margin-bottom:4px; opacity:0.9; }
.cl-role.role-director   { color:var(--gold); text-shadow:0 0 10px rgba(201,168,76,0.4); }
.cl-role.role-actor      { color:var(--cream-muted); }
.cl-role.role-screenplay { color:rgba(201,168,76,0.6); }
.cl-role.role-dp         { color:rgba(201,168,76,0.6); }
.cl-role.role-producer   { color:rgba(201,168,76,0.6); }
/* ── Try again ───────────────────────────────────────────────────── */
#tryAgainWrap { display:none; text-align:center; margin-top:48px; }
.try-again-btn { font-family:'Cinzel',serif; font-size:9px; letter-spacing:4px; color:var(--gold-dim); text-transform:uppercase; border:1px solid rgba(201,168,76,0.2); padding:12px 32px; background:none; cursor:pointer; transition:all 0.3s; display:inline-flex; align-items:center; gap:12px; }
.try-again-btn:hover { color:var(--gold); border-color:rgba(201,168,76,0.4); box-shadow:0 0 20px rgba(201,168,76,0.1); }
.try-line { width:18px; height:1px; background:currentColor; transition:width 0.3s; }
.try-again-btn:hover .try-line { width:28px; }
.error-msg { text-align:center; font-family:'Cinzel',serif; font-size:9px; letter-spacing:3px; color:var(--crimson-bright); text-transform:uppercase; padding:32px 0; display:none; }
footer { border-top:1px solid rgba(201,168,76,0.08); }
@media(max-width:640px) {
  main { padding:48px 24px 100px; }
  .film-inputs { grid-template-columns:1fr; gap:24px; }
  .input-connector { display:none; }
  .cl-text { padding:6px 16px; font-size:15px; }
  .cn-title { font-size:18px; }
}
</style>

<body>

<nav class="nav">

<header>
  <div class="room-label">Four Degrees</div>
  <h1>Four <em>Degrees</em></h1>
  <div class="header-ornament">
    <div class="orn-line"></div>
    <div class="orn-diamond"></div>
    <div class="orn-line r"></div>
  </div>
  <p class="header-sub">Name two films. The archive traces the real chain connecting them — up to four degrees.</p>
</header>

<main>

  <div class="input-stage" id="inputStage">
    <div class="film-inputs">
      <div class="film-input-group">
        <div class="film-input-label">Film One</div>
        <input type="text" id="filmA" class="film-input" placeholder="e.g. Casablanca" autocomplete="off" spellcheck="false">
      </div>
      <div class="input-connector">↔</div>
      <div class="film-input-group">
        <div class="film-input-label">Film Two</div>
        <input type="text" id="filmB" class="film-input" placeholder="e.g. Blade Runner 2049" autocomplete="off" spellcheck="false">

      <button class="submit-btn" id="submitBtn">Build the Chain</button>
    </div>

<footer>

<script>
  const ORACLE = 'https://oracle-proxy.adamrowe312.workers.dev';
  const TMDB   = 'https://tmdb-proxy.adamrowe312.workers.dev';
  const IMG    = 'https://image.tmdb.org/t/p/w342';

  const ROMAN = ['I','II','III','IV','V','VI','VII'];
  const PREFERRED_JOBS = ['Director','Screenplay','Director of Photography','Producer'];

  // ── Credits cache (Promise-keyed to prevent duplicate in-flight fetches) ──
  const _creditsCache = new Map();

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
  }

  function setStatus(msg) {
    document.getElementById('loadingState').textContent = msg;
  }

  // ── TMDB helpers ────────────────────────────────────────────────────

  async function fetchWithRetry(url) {
    let res = await fetch(url, { signal: AbortSignal.timeout(15000) });
    if (res.status === 429) {
      await new Promise(r => setTimeout(r, 1200));
      res = await fetch(url, { signal: AbortSignal.timeout(15000) });
    }
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }

  async function resolveFilm(titleRaw) {
    const yearMatch = titleRaw.match(/\((\d{4})\)/);
    const clean = titleRaw.replace(/\s*\(\d{4}\)/, '').trim();
    const year  = yearMatch ? yearMatch[1] : '';
    const res  = await fetch(`${TMDB}/search/movie?query=${encodeURIComponent(clean)}${year ? `&primary_release_year=${year}` : ''}&include_adult=false`);
    const data = await res.json();
    if (!data.results || !data.results[0]) return null;
    const m = data.results[0];
    return {
      id: m.id,
      title: m.title,
      year: m.release_date ? m.release_date.slice(0, 4) : year,
      poster_path: m.poster_path
    };
  }

  async function fetchCredits(filmId) {
    if (!_creditsCache.has(filmId)) {
      _creditsCache.set(filmId, fetchWithRetry(`${TMDB}/movie/${filmId}/credits`).then(data => {
        const cast = (data.cast || []).filter(p => p.order <= 15).map(p => ({
          id: p.id, name: p.name, job: 'Actor', role: 'cast'
        }));
        const crew = (data.crew || []).filter(p => PREFERRED_JOBS.includes(p.job)).map(p => ({
          id: p.id, name: p.name, job: p.job, role: 'crew'
        }));
        // deduplicate by person id, crew takes priority
        const seen = new Set();
        const people = [];
        for (const p of [...crew, ...cast]) {
          if (!seen.has(p.id)) { seen.add(p.id); people.push(p); }
        }
        return people;
      }).catch(() => []));
    }
    return _creditsCache.get(filmId);
  }

  // ── Claude: suggest path + narration ────────────────────────────────

  async function suggestAndNarrate(filmA, filmB, failureHint = null) {
    const retryNote = failureHint
      ? `\nIMPORTANT: A previous suggestion failed TMDB verification: ${failureHint}. Please suggest a different real person or path.`
      : '';

    const prompt = `You are connecting two films via real shared cast or crew verified by TMDB.

Film A: "${filmA.title}" (${filmA.year})
Film B: "${filmB.title}" (${filmB.year})
${retryNote}

Find the shortest real connection. Prefer 1-hop (shared person). Use 2-hop (one intermediate film) or 3-hop (two intermediate films) only if necessary.

Respond in EXACTLY this format — no other text:

PATH:
PERSON: [exact full name as credited in TMDB]
ROLE_A: [their role in Film A: Actor|Director|Screenplay|Producer|Director of Photography]
ROLE_B: [their role in Film B — only include for 1-hop]
INTERM: [first intermediate film title — only for 2-hop or 3-hop]
PERSON2: [second person's name — only for 2-hop or 3-hop]
ROLE_B2: [person2's role in INTERM — only for 2-hop or 3-hop]
INTERM2: [second intermediate film title — only for 3-hop]
PERSON3: [third person's name — only for 3-hop]
ROLE_B3: [person3's role in Film B — only for 3-hop]

NARRATION:
1. [One sentence about person1's connection — mention their role and both films they link]
2. [One sentence about person2's connection — only for 2-hop or 3-hop]
3. [One sentence about person3's connection — only for 3-hop]`;

    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 25000);
    let res;
    try {
      res = await fetch(ORACLE, {
        signal: controller.signal,
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 300,
          messages: [{ role: 'user', content: prompt }]
        })
      });
    } finally {
      clearTimeout(timer);
    }
    if (!res.ok) throw new Error('oracle');
    const data = await res.json();
    return data.content[0].text;
  }

  // ── Parse Claude's structured response ──────────────────────────────

  function parseSuggestion(text) {
    const pathMatch = text.match(/PATH:([\s\S]*?)(?:NARRATION:|$)/);
    const narrationMatch = text.match(/NARRATION:([\s\S]*)/);

    if (!pathMatch) return null;
    const pathLines = pathMatch[1].trim().split('\n').map(l => l.trim()).filter(Boolean);

    const get = (prefix) => {
      const line = pathLines.find(l => l.startsWith(prefix + ':'));
      return line ? line.slice(prefix.length + 1).trim() : null;
    };

    const narrationLines = narrationMatch
      ? narrationMatch[1].trim().split('\n')
          .map(l => l.replace(/^\d+\.\s*/, '').trim())
          .filter(Boolean)
      : [];

    const person  = get('PERSON');
    const roleA   = get('ROLE_A');
    const roleB   = get('ROLE_B');
    const interm  = get('INTERM');
    const person2 = get('PERSON2');
    const roleB2  = get('ROLE_B2');
    const interm2 = get('INTERM2');
    const person3 = get('PERSON3');
    const roleB3  = get('ROLE_B3');

    if (!person || !roleA) return null;

    // 3-hop: requires both intermediate films and all three people
    if (interm && person2 && interm2 && person3) {
      return {
        type: '3hop',
        person1: person,  role1inA: roleA,
        intermFilm: interm,
        person2,          role2inInterm: roleB2 || 'Actor',
        intermFilm2: interm2,
        person3,          role3inB: roleB3 || 'Actor',
        narration: narrationLines
      };
    }

    // 2-hop: one intermediate film + second person
    if (interm && person2) {
      return {
        type: '2hop',
        person1: person, role1inA: roleA, intermFilm: interm,
        person2, role2inB: roleB2 || roleA,
        narration: narrationLines
      };
    }

    // 1-hop: direct shared person
    return {
      type: '1hop',
      person, roleInA: roleA, roleInB: roleB || roleA,
      narration: narrationLines
    };
  }

  // ── Verify Claude's suggestion against TMDB ──────────────────────────

  async function verifyAndBuildPath(suggestion, filmDataA, filmDataB, creditsA, creditsB) {
    if (!suggestion) return null;

    // Helper: find person in credits by name (case-insensitive, partial match allowed)
    function findInCredits(credits, name) {
      const n = name.toLowerCase();
      return credits.find(p => p.name.toLowerCase() === n ||
        p.name.toLowerCase().includes(n) || n.includes(p.name.toLowerCase()));
    }

    if (suggestion.type === '1hop') {
      const matchA = findInCredits(creditsA, suggestion.person);
      const matchB = findInCredits(creditsB, suggestion.person);
      if (!matchA || !matchB) {
        return { verified: false, reason: `"${suggestion.person}" not found in credits of both films` };
      }
      const personNode = {
        type: 'person',
        id: matchA.id,
        name: matchA.name,
        job: suggestion.roleInA,
        role: PREFERRED_JOBS.includes(suggestion.roleInA) ? 'crew' : 'cast'
      };
      return {
        verified: true,
        path: [
          { type: 'film', ...filmDataA },
          personNode,
          { type: 'film', ...filmDataB }
        ],
        narration: suggestion.narration
      };
    }

    if (suggestion.type === '2hop') {
      const matchA = findInCredits(creditsA, suggestion.person1);
      if (!matchA) {
        return { verified: false, reason: `"${suggestion.person1}" not found in credits of "${filmDataA.title}"` };
      }

      let intermData;
      try { intermData = await resolveFilm(suggestion.intermFilm); }
      catch(_) { intermData = null; }
      if (!intermData) {
        return { verified: false, reason: `Intermediate film "${suggestion.intermFilm}" not found in TMDB` };
      }

      let intermCredits;
      try { intermCredits = await fetchCredits(intermData.id); }
      catch(_) {
        return { verified: false, reason: `Could not fetch credits for "${intermData.title}"` };
      }

      const match1inInterm = findInCredits(intermCredits, suggestion.person1);
      const match2inInterm = findInCredits(intermCredits, suggestion.person2);
      const match2inB      = findInCredits(creditsB, suggestion.person2);

      if (!match1inInterm) {
        return { verified: false, reason: `"${suggestion.person1}" not found in credits of "${intermData.title}"` };
      }
      if (!match2inInterm || !match2inB) {
        return { verified: false, reason: `"${suggestion.person2}" not found connecting "${intermData.title}" to "${filmDataB.title}"` };
      }

      return {
        verified: true,
        path: [
          { type: 'film', ...filmDataA },
          { type: 'person', id: matchA.id, name: matchA.name,
            job: suggestion.role1inA,
            role: PREFERRED_JOBS.includes(suggestion.role1inA) ? 'crew' : 'cast' },
          { type: 'film', ...intermData },
          { type: 'person', id: match2inB.id, name: match2inB.name,
            job: suggestion.role2inB,
            role: PREFERRED_JOBS.includes(suggestion.role2inB) ? 'crew' : 'cast' },
          { type: 'film', ...filmDataB }
        ],
        narration: suggestion.narration
      };
    }

    if (suggestion.type === '3hop') {
      const matchA = findInCredits(creditsA, suggestion.person1);
      if (!matchA) {
        return { verified: false, reason: `"${suggestion.person1}" not found in credits of "${filmDataA.title}"` };
      }

      // Resolve both intermediate films in parallel
      let intermData1, intermData2;
      try {
        [intermData1, intermData2] = await Promise.all([
          resolveFilm(suggestion.intermFilm),
          resolveFilm(suggestion.intermFilm2)
        ]);
      } catch(_) { intermData1 = null; intermData2 = null; }

      if (!intermData1) {
        return { verified: false, reason: `Intermediate film "${suggestion.intermFilm}" not found in TMDB` };
      }
      if (!intermData2) {
        return { verified: false, reason: `Intermediate film "${suggestion.intermFilm2}" not found in TMDB` };
      }

      // Fetch both intermediate credits in parallel
      let intermCredits1, intermCredits2;
      try {
        [intermCredits1, intermCredits2] = await Promise.all([
          fetchCredits(intermData1.id),
          fetchCredits(intermData2.id)
        ]);
      } catch(_) {
        return { verified: false, reason: `Could not fetch credits for intermediate films` };
      }

      // person1: filmA → interm1
      const match1inInterm1 = findInCredits(intermCredits1, suggestion.person1);
      if (!match1inInterm1) {
        return { verified: false, reason: `"${suggestion.person1}" not found in credits of "${intermData1.title}"` };
      }

      // person2: interm1 → interm2
      const match2inInterm1 = findInCredits(intermCredits1, suggestion.person2);
      const match2inInterm2 = findInCredits(intermCredits2, suggestion.person2);
      if (!match2inInterm1 || !match2inInterm2) {
        return { verified: false, reason: `"${suggestion.person2}" not found bridging "${intermData1.title}" and "${intermData2.title}"` };
      }

      // person3: interm2 → filmB
      const match3inInterm2 = findInCredits(intermCredits2, suggestion.person3);
      const match3inB       = findInCredits(creditsB, suggestion.person3);
      if (!match3inInterm2 || !match3inB) {
        return { verified: false, reason: `"${suggestion.person3}" not found connecting "${intermData2.title}" to "${filmDataB.title}"` };
      }

      return {
        verified: true,
        path: [
          { type: 'film', ...filmDataA },
          { type: 'person', id: matchA.id, name: matchA.name,
            job: suggestion.role1inA,
            role: PREFERRED_JOBS.includes(suggestion.role1inA) ? 'crew' : 'cast' },
          { type: 'film', ...intermData1 },
          { type: 'person', id: match2inInterm1.id, name: match2inInterm1.name,
            job: suggestion.role2inInterm,
            role: PREFERRED_JOBS.includes(suggestion.role2inInterm) ? 'crew' : 'cast' },
          { type: 'film', ...intermData2 },
          { type: 'person', id: match3inB.id, name: match3inB.name,
            job: suggestion.role3inB,
            role: PREFERRED_JOBS.includes(suggestion.role3inB) ? 'crew' : 'cast' },
          { type: 'film', ...filmDataB }
        ],
        narration: suggestion.narration
      };
    }

    return null;
  }

  // ── Render ───────────────────────────────────────────────────────────

  function roleClass(job) {
    const j = (job || '').toLowerCase();
    if (j === 'director')              return 'role-director';
    if (j === 'actor')                 return 'role-actor';
    if (j === 'screenplay')            return 'role-screenplay';
    if (j === 'director of photography') return 'role-dp';
    if (j === 'producer')              return 'role-producer';
    return 'role-actor';
  }

  function buildFilmNodeHTML(node, filmIndex, totalFilms, animIndex) {
    const isEndpoint = filmIndex === 0 || filmIndex === totalFilms - 1;
    const poster = node.poster_path
      ? `<img class="cn-poster" src="${IMG}${node.poster_path}" alt="" loading="lazy" onerror="this.parentElement.innerHTML='<div class=cn-no-poster>✦</div>'">`
      : '<div class="cn-no-poster">✦</div>';
    return `
      <div class="chain-node${isEndpoint ? ' endpoint' : ''}" style="animation-delay:${animIndex * 0.18}s">
        <div class="cn-poster-wrap">${poster}</div>
        <div>
          <div class="cn-step">${ROMAN[filmIndex] || filmIndex + 1}</div>
          <div class="cn-title">${esc(node.title)}</div>
          <div class="cn-year">${esc(node.year)}</div>
        </div>
      </div>`;
  }

  function buildPersonLinkHTML(node, narration, animIndex) {
    const rc = roleClass(node.job);
    const d = `${animIndex * 0.18 + 0.09}s`;
    return `
      <div class="chain-link" style="animation-delay:${d}; --link-delay:${d}">
        <div class="cl-line"></div>
        <div class="cl-dot"></div>
        <div class="cl-role ${rc}">${esc(node.job)}</div>
        <div class="cl-text">${esc(narration || node.name)}</div>
        <div class="cl-dot"></div>
        <div class="cl-line"></div>
      </div>`;
  }

  function renderChain(path, narration) {
    document.getElementById('loadingState').style.display = 'none';
    const container = document.getElementById('chain');
    container.innerHTML = '';

    const filmNodes = path.filter(n => n.type === 'film');
    const totalFilms = filmNodes.length;
    let filmIndex = 0;
    let animIndex = 0;
    let narrationIdx = 0;

    path.forEach((node) => {
      if (node.type === 'film') {
        container.insertAdjacentHTML('beforeend', buildFilmNodeHTML(node, filmIndex, totalFilms, animIndex));
        filmIndex++;
        animIndex++;
      } else if (node.type === 'person') {
        const prose = narration[narrationIdx] || '';
        narrationIdx++;
        container.insertAdjacentHTML('beforeend', buildPersonLinkHTML(node, prose, animIndex));
        animIndex++;
      }
    });

    document.getElementById('chainStage').style.display = 'block';
    document.getElementById('tryAgainWrap').style.display = 'block';
  }

  // ── Main orchestrator ────────────────────────────────────────────────

  async function buildChain() {
    const filmAInput = document.getElementById('filmA').value.trim();
    const filmBInput = document.getElementById('filmB').value.trim();
    if (!filmAInput || !filmBInput) {
      document.getElementById('filmA').focus();
      return;
    }

    document.getElementById('submitBtn').disabled = true;
    document.getElementById('errorMsg').style.display   = 'none';
    document.getElementById('chainStage').style.display = 'none';
    document.getElementById('tryAgainWrap').style.display = 'none';
    document.getElementById('chain').innerHTML = '';
    document.getElementById('loadingState').style.display = 'block';

    try {
      // Phase 1: Resolve both films
      setStatus('Searching the archives...');
      let filmDataA, filmDataB;
      try {
        [filmDataA, filmDataB] = await Promise.all([
          resolveFilm(filmAInput),
          resolveFilm(filmBInput)
        ]);
      } catch(e) {
        throw new Error('not-found');
      }
      if (!filmDataA || !filmDataB) throw new Error('not-found');

      // Phase 2: Fetch both credits simultaneously
      setStatus('Tracing the connection...');
      const [creditsA, creditsB] = await Promise.all([
        fetchCredits(filmDataA.id),
        fetchCredits(filmDataB.id)
      ]); // each fetchCredits call uses its own AbortSignal.timeout internally

      // Phase 3: Direct TMDB intersection check (no Claude needed)
      const personSetB = new Map(creditsB.map(p => [p.id, p]));
      const directMatch = creditsA.find(p => personSetB.has(p.id));

      if (directMatch) {
        const job  = directMatch.job || 'Actor';
        const role = PREFERRED_JOBS.includes(job) ? 'crew' : 'cast';
        const article = 'aeiou'.includes((job)[0].toLowerCase()) ? 'an' : 'a';
        const narration = [
          `${directMatch.name} served as ${article} ${job} on both ${filmDataA.title} and ${filmDataB.title}, forging a direct creative link between the two films.`
        ];
        const path = [
          { type: 'film', ...filmDataA },
          { type: 'person', id: directMatch.id, name: directMatch.name, job, role },
          { type: 'film', ...filmDataB }
        ];
        renderChain(path, narration);
        return;
      }

      // Phase 4: Ask Claude to suggest a path
      setStatus('Consulting the oracle...');
      const suggestionText = await suggestAndNarrate(filmDataA, filmDataB);
      const suggestion = parseSuggestion(suggestionText);

      // Phase 5: Verify suggestion
      setStatus('Verifying the connection...');
      const result = await verifyAndBuildPath(suggestion, filmDataA, filmDataB, creditsA, creditsB);

      if (result && result.verified) {
        renderChain(result.path, result.narration);
        return;
      }

      // Phase 6: Retry with failure feedback
      const failureHint = (result && result.reason) ? result.reason : 'previous suggestion could not be verified';
      setStatus('Searching deeper...');
      const retrySuggestionText = await suggestAndNarrate(filmDataA, filmDataB, failureHint);
      const retrySuggestion = parseSuggestion(retrySuggestionText);
      const retryResult = await verifyAndBuildPath(retrySuggestion, filmDataA, filmDataB, creditsA, creditsB);

      if (retryResult && retryResult.verified) {
        renderChain(retryResult.path, retryResult.narration);
        return;
      }

      throw new Error('no-path');

    } catch(e) {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('submitBtn').disabled = false;
      const errEl = document.getElementById('errorMsg');
      const msg = e.message === 'not-found'
        ? 'Film not recognised — check the title and try again'
        : e.message === 'no-path'
        ? 'No verified connection found — try a different pair of films'
        : 'Something went wrong — please try again';
      errEl.textContent = msg;
      errEl.style.display = 'block';
    }
  }

  function reset() {
    _creditsCache.clear();
    document.getElementById('filmA').value = '';
    document.getElementById('filmB').value = '';
    document.getElementById('chain').innerHTML = '';
    document.getElementById('chainStage').style.display = 'none';
    document.getElementById('tryAgainWrap').style.display = 'none';
    document.getElementById('errorMsg').style.display = 'none';
    document.getElementById('submitBtn').disabled = false;
    document.getElementById('filmA').focus();
  }

  document.getElementById('submitBtn').addEventListener('click', buildChain);
  document.getElementById('tryAgainBtn').addEventListener('click', reset);
  document.getElementById('filmB').addEventListener('keydown', e => { if (e.key === 'Enter') buildChain(); });
  document.getElementById('filmA').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('filmB').focus(); });
</script>

<script>
(function(){
  if(window.innerWidth<900)return;
  if(window.matchMedia('(prefers-reduced-motion:reduce)').matches)return;
  ['rail-l','rail-r'].forEach(function(c){
    var r=document.createElement('div');
    r.className='theatre-rail '+c;
    r.setAttribute('aria-hidden','true');
    r.innerHTML='<div class="rail-track"><div class="rail-fill"></div></div>'
               +'<div class="rail-marker"></div>'
               +'<div class="rail-glow"></div>';
    document.body.appendChild(r);
  });
  var fills=document.querySelectorAll('.rail-fill');
  var markers=document.querySelectorAll('.rail-marker');
  var glows=document.querySelectorAll('.rail-glow');
  function update(){
    var s=window.scrollY,maxS=document.documentElement.scrollHeight-window.innerHeight;
    var p=maxS>0?Math.min(1,Math.max(0,s/maxS)):0;
    fills.forEach(function(f){f.style.height=(p*100)+'%';});
    markers.forEach(function(m){m.style.top=(80+p*(window.innerHeight-160))+'px';});
    if(glows[0])glows[0].style.top=(8+p*54)+'%';
    if(glows[1])glows[1].style.top=(22+p*52)+'%';
  }
  window.addEventListener('scroll',update,{passive:true});
  window.addEventListener('resize',update,{passive:true});
  update();
})();
</script>
